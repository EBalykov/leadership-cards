<style>
  :root{
    --bg:#100d08; --txt:#ece4d3; --mut:#9b917c; --line:rgba(236,228,211,.13);
    --panel:rgba(236,228,211,.055); --panel2:rgba(236,228,211,.11);
    --cream-a:#fdf9f1; --cream-b:#efe6d4; --ink:#26211a; --cmut:#9b9079;
    --sans:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    --serif:'Spectral',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1200px 720px at 50% -12%, #2c2618 0%, rgba(44,38,24,0) 60%),
      radial-gradient(960px 620px at 88% 116%, #1f2a2c 0%, rgba(31,42,44,0) 55%),
      linear-gradient(180deg,#15120b 0%,#100d08 100%);
    background-color:var(--bg); color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.55; min-height:100vh; min-height:100dvh;
    padding:max(22px,env(safe-area-inset-top)) 16px calc(56px + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  .wrap{max-width:980px;margin:0 auto}
  .header{text-align:center;margin:2px 0 11px}
  .eyebrow{font:600 9.5px/1 var(--sans);letter-spacing:.34em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  h1{font:500 clamp(26px,6.4vw,38px)/1.04 var(--serif);margin:0;letter-spacing:.01em;color:var(--txt)}
  .tagline{margin:7px 0 0;color:var(--mut);font:400 13px/1.5 var(--sans)}

  .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 auto 14px}
  .ctl{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt);cursor:pointer;font:500 12.5px/1 var(--sans);min-height:42px}
  .ctl .q{display:inline-flex;width:16px;height:16px;border-radius:50%;border:1px solid rgba(236,228,211,.5);align-items:center;justify-content:center;font:600 10px/1 var(--sans)}
  .ctl .caret{color:var(--mut);font-size:11px}

  .cats{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;max-width:820px;margin:0 auto 16px}
  .cats.collapsed{display:none}
  .catlabel{flex-basis:100%;text-align:center;font:600 9px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--mut);margin:7px 0 1px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);
    background:transparent;color:var(--mut);cursor:pointer;font:500 12.5px/1.1 var(--sans);white-space:nowrap;min-height:36px}
  .chip.on{background:var(--panel);color:var(--txt)}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .chip .cnt{color:var(--mut);font-size:11px}

  .actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:4px auto 26px}
  .btn{padding:11px 16px;border-radius:13px;cursor:pointer;font:600 13.5px/1.1 var(--sans);min-height:46px;
    border:1px solid var(--line);background:var(--panel);color:var(--txt);display:inline-flex;align-items:center;gap:6px;justify-content:center}
  .btn.primary{border:none;background:linear-gradient(180deg,#fbf6ea,#ece0c6);color:#241f16;box-shadow:0 10px 26px -10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.6)}
  .btn.on{box-shadow:inset 0 0 0 1px rgba(236,225,200,.4)}
  .btn:disabled{opacity:.4;cursor:default}
  .btn .mini{font-size:11px;opacity:.8;font-weight:500}

  .stage{display:flex;gap:18px;justify-content:center;align-items:flex-start;flex-wrap:wrap;min-height:60vh}
  .col{display:flex;flex-direction:column;align-items:center;gap:9px;max-width:100%}
  .role{font:600 10.5px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--mut);text-align:center}
  .pathctx{flex-basis:100%;text-align:center;margin-bottom:-2px}
  .pathctx .k{font:600 10px/1 var(--sans);letter-spacing:.3em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  .pathctx .v{display:inline-flex;align-items:center;gap:9px;font:500 13.5px/1 var(--sans);color:var(--txt);flex-wrap:wrap;justify-content:center}

  .scene{width:min(92vw,358px);perspective:1500px;opacity:1;animation:deal .5s ease both}
  .scene.small{width:min(78vw,250px)}
  /* появление ТОЛЬКО через transform — без opacity, чтобы карта была видна даже если браузер/webview ставит анимации на паузу */
  @keyframes deal{from{transform:translateY(12px)}to{transform:none}}
  .card{position:relative;display:grid;width:100%;min-height:clamp(430px,68vh,520px);
    transform-style:preserve-3d;-webkit-transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.4,.1,.2,1);transform:rotateY(0);cursor:pointer;border-radius:24px}
  .scene.small .card{min-height:clamp(370px,56vh,430px)}
  .card.flip{transform:rotateY(180deg)}
  .card:focus-visible{outline:2px solid rgba(236,225,200,.6);outline-offset:4px}
  .face{grid-area:1/1;-webkit-backface-visibility:hidden;backface-visibility:hidden;transform:rotateY(0);
    border-radius:24px;padding:1.6px;position:relative;
    box-shadow:0 24px 60px -24px rgba(0,0,0,.5),0 16px 44px -18px rgba(0,0,0,.72)}
  .face.back{transform:rotateY(180deg)}
  .inner{position:relative;overflow:hidden;border-radius:22.5px;height:100%;
    background:linear-gradient(162deg,var(--cream-a),var(--cream-b));
    padding:clamp(17px,4.4vw,22px);display:flex;flex-direction:column}
  .holo{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;background-size:200% 200%;
    background-position:0% 50%;animation:holo 9s ease-in-out infinite;z-index:1}
  .sheen{position:absolute;inset:0;pointer-events:none;z-index:3;mix-blend-mode:screen;opacity:.7;
    background:linear-gradient(105deg,transparent 36%,rgba(255,255,255,.5) 46%,rgba(255,255,255,.92) 50%,rgba(255,255,255,.5) 54%,transparent 64%);
    background-size:250% 100%;background-position:175% 0;animation:sheen 6.5s linear infinite}
  @keyframes holo{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes sheen{0%{background-position:175% 0}55%{background-position:-75% 0}100%{background-position:-75% 0}}
  .content{position:relative;z-index:2;display:flex;flex-direction:column;flex:1 1 auto}

  .c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
  .badge{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
    background:rgba(34,29,20,.05);border:1px solid rgba(34,29,20,.1);font:600 11.5px/1.3 var(--sans);color:var(--ink)}
  .badge .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .tools{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .num{font:500 11.5px/1 var(--sans);color:var(--cmut);margin-left:3px;white-space:nowrap}
  .icobtn{width:38px;height:38px;min-width:38px;display:inline-flex;align-items:center;justify-content:center;
    border:none;background:transparent;color:var(--cmut);cursor:pointer;border-radius:10px;font-size:18px;line-height:1;padding:0}
  .icobtn.on{color:#e0608a}
  .glyph{align-self:center;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:6px 0 9px}
  .c-title{font:600 clamp(20px,5.2vw,25px)/1.18 var(--serif);color:var(--ink);text-align:center;margin:0 0 10px}
  .divider{width:38px;height:2px;margin:0 auto 15px;border-radius:2px}
  .label{font:600 10.5px/1.4 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--cmut);margin-bottom:5px}
  .text{font:400 15px/1.52 var(--serif);color:var(--ink);margin:0 0 13px}
  .text.q{font-style:italic}
  .crit{display:flex;gap:8px;align-items:flex-start;margin:0 0 13px}
  .crit .ok{color:#0f8a5f;font-weight:700;flex:0 0 auto}
  .crit span:last-child{font:400 14.5px/1.5 var(--serif);color:var(--ink)}
  .foot{margin-top:auto;padding-top:12px;border-top:1px solid rgba(34,29,20,.1);display:flex;justify-content:space-between;align-items:center;gap:8px;font:500 10.5px/1.3 var(--sans);color:var(--cmut)}
  .foot .src{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}
  .flip-hint{display:inline-flex;align-items:center;gap:7px;align-self:center;padding:6px 13px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--mut);font:500 11.5px/1 var(--sans)}

  .pathnav{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;max-width:400px;margin:2px auto 0;flex-basis:100%}
  .navarrow{flex:0 0 auto;width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center}
  .navarrow:active{background:var(--panel2)}
  .navarrow:disabled{opacity:.3;cursor:default}
  .navpos{flex:1 1 auto;text-align:center;max-width:200px}
  .navpos .pn{font:600 13px/1 var(--sans);color:var(--txt);margin-bottom:6px}
  .navpos .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden}
  .navpos .bar span{display:block;height:100%}
  .empty{color:var(--mut);align-self:center;text-align:center;padding:70px 16px;max-width:320px;font:400 15px/1.6 var(--sans)}

  .overlay{position:fixed;inset:0;background:rgba(12,9,4,.64);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;justify-content:center;z-index:50}
  @media(min-width:600px){.overlay{align-items:center}}
  .sheet{background:linear-gradient(180deg,#1c1810,#141009);width:100%;max-width:600px;max-height:88vh;
    border:1px solid var(--line);border-radius:20px 20px 0 0;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -24px 70px rgba(0,0,0,.55)}
  @media(min-width:600px){.sheet{border-radius:20px}}
  .sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:18px 20px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .sheet-body{overflow:auto;padding:2px 20px 8px}
  .sheet-foot{flex:0 0 auto;padding:14px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
  .jrow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:transparent;color:var(--txt);cursor:pointer;padding:11px 12px;border-radius:12px;font:inherit}
  .jrow .jg{font-size:20px;flex:0 0 auto}
  .jrow .jt{flex:1;font:500 14px/1.35 var(--sans)}
  .jrow .jm{font:500 12px/1.3 var(--sans);color:var(--mut);white-space:nowrap}
  .hP{color:rgba(236,228,211,.82);font:400 14px/1.62 var(--sans);margin:0 0 6px}
  .hH{font:600 9.5px/1 var(--sans);letter-spacing:.22em;text-transform:uppercase;color:var(--mut);margin:24px 0 7px}
  .hT{font:500 17px/1.25 var(--serif);color:var(--txt);margin-bottom:10px}
  .hcard{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
  .hcard b{font:600 11px/1.5 var(--sans);color:#e9d9b0;letter-spacing:.05em;flex:0 0 auto;width:56px}

  .toast{position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
    background:linear-gradient(180deg,#fbf6ea,#ece0c6);color:#241f16;padding:11px 20px;border-radius:999px;font:600 14px/1 var(--sans);
    opacity:0;pointer-events:none;transition:.22s;z-index:60;box-shadow:0 12px 30px -10px rgba(0,0,0,.6)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  :focus-visible{outline:2px solid rgba(236,225,200,.55);outline-offset:3px}
  @media(prefers-reduced-motion:reduce){
    .scene{animation:none}.card{transition:none}.holo,.sheen{animation:none}
  }
</style>
</head>

  };

  var CARDS = [{"cat":"integrity","title":"честь слова, не мораль","distinction":"Целостность — не про «хорошо/плохо» и не про этику, а про работоспособность конструкции, которой вы являетесь. сдержанное слово создает вас цельным независимо от того, благое оно или нет.","question":"где сегодня вы путаете нравственность с целостностью и прячетесь за оценкой себя как хорошего вместо того, чтобы честно спросить: держу ли я свое слово?","task":"возьмите одно свое невыполненное обещание и проживите момент, проговорив вслух самому себе, как это проживается: «я не сдержал слово» — без оправдания, без морального суда над собой, только констатация факта. понаблюдайте, что происходит внутри.","criterion":"вы заметили, что назвали факт нарушения слова чистым высказыванием и не скатились ни в самобичевание, ни в оправдание — осталась чистая констатация.","time":"15 минут"},{"cat":"integrity","title":"слово роняет работоспособность","distinction":"нарушенное слово — не нравственный проступок, а падение работоспособности: конструкция, которой вы являетесь, перестает держать нагрузку. дело буксует не из-за людей, а из-за зазора между словом данным и словом сдержанным.","question":"какая буксующая задача на самом деле держится на чьем-то фактически провисшем слове, и какой контекст вы принимаете за факт вместо того, чтобы увидеть разрыв?","task":"выберите дело, которое стоит на месте, и откройте-для-себя в нем конкретное провисшее слово — чье именно обещание не выполнено. запишите его одной фразой, назвав разницу между словом данным и реальным положением дел.","criterion":"вы обнаружили точное невыполненное обещание за пробуксовкой и можете показать на него пальцем, отличив само нарушение от историй про нехватку времени или другие обстоятельства.","time":"20 минут"},{"cat":"integrity","title":"честное «нет»","distinction":"«да», которое вы не выполните, создает пустоту внутри конструкции, которой вы являетесь. согласие, данное чтобы не разочаровывать, — это уже нарушенное слово, отложенное на потом: речевой акт, в котором уже спрятана неправда.","question":"какому «да» сегодня вы говорите, заранее зная из своего уже-всегда слушания, что не сдержите его, — лишь бы в моменте избежать неловкости?","task":"в одном разговоре, где вас просят о невыполнимом, совершите речевой акт отказа: скажите прямое «нет» или «я не могу этого обещать» вместо вежливого согласия — и понаблюдайте, что при этом происходит с вами и с другим.","criterion":"вы заметили, как вслух отказали или честно обозначили границу там, где раньше согласились бы автоматически, и не смягчили это ложным намеком на будущее выполнение.","time":"1 разговор"},{"cat":"integrity","title":"восстановление слова","distinction":"Целостность не в том, чтобы никогда не нарушать слово, а в том, чтобы восстанавливать его: это речевой акт признания, прояснения последствий для другого и новое слово как конкретное обещание.","question":"чье нарушенное вами слово вы до сих пор не восстановили, потому что застряли в контексте стыда вместо того, чтобы взять ответственность и навести порядок?","task":"выберите одно нарушенное обещание и проживите восстановление как полный речевой акт: скажите человеку, что нарушили слово, спросите, чем это аукнулось ему, услышьте его полностью и дайте конкретное новое выполнимое слово. заметьте, что меняется в конструкции отношений после этого.","criterion":"вы открыли-для-себя, каково это — провести восстановление целиком: назвать нарушение, услышать последствия для другого, взять ответственность и дать новое слово — как-это-проживается в вас обоих.","time":"1 разговор"},{"cat":"integrity","title":"слово создает реальность","distinction":"ваше слово — не отчет о намерениях, а речевой акт, на основе которого другой строит свою реальность. когда вы обещаете, человек уже перестраивает планы под контекст вашего обещания, еще до того как вы что-то сделали — это уже факт его реальности.","question":"под какое ваше слово прямо сейчас кто-то уже выстроил свой день или дело — и спросили ли вы его прямо, на что он рассчитывает?","task":"обратитесь к конкретному человеку, который ждет от вас обещанного, с речевым актом вопроса: «на что именно вы рассчитываете и к какому сроку?» — и понаблюдайте, насколько его картина совпадает с вашей.","criterion":"вы открыли-для-себя из его слов, что конкретно он построил на вашем слове, и обнаружили либо совпадение, либо разрыв — теперь это факт, на который можно действовать.","time":"1 разговор"},{"cat":"integrity","title":"слово себе","distinction":"Целостность начинается со слова, данного самому себе: это речевой акт, который никто, кроме вас, не контролирует. невыполненные обещания себе роняют вашу работоспособность так же, как нарушенные обещания другим, — просто свидетелей нет, и падение легче списать.","question":"какое слово себе вы нарушаете изо дня в день так привычно, что уже перестали видеть в этом нарушение слова?","task":"дайте себе одно маленькое, заведомо выполнимое слово (например «лягу до 23:00») и проживите с ним один день — если поймете, что не сдержите, переобещайте вслух себе до срока, проговорив новое обещание как речевой акт, а не молча. заметьте, что происходит с вашей работоспособностью по ходу дня.","criterion":"вы заметили, что к концу дня слово либо сдержано вами полностью, либо переобещано вслух в моменте разницы — и нет молчаливого падения конструкции.","time":"1 день"},{"cat":"authentic","title":"парадокс аутентичности","distinction":"аутентичность не рождается из отказа от неаутентичности. она приходит в тот момент, когда вы честно называете, где именно вы прямо сейчас неаутентичны. не преодоление маски — ее видение, совпавшее с признанием.","question":"какую маску вы держите прямо сейчас, скрывая ее от себя? и какая позиция открывается, если вы эту неаутентичность просто назовете?","task":"проживите один речевой акт признания: скажите одному человеку одну конкретную свою неаутентичность вслух — «я делаю вид, что мне все понятно, а на самом деле нет», — без смягчения и без оговорки. заметьте, что в этот момент сдвигается.","criterion":"вы открыли-для-себя: аутентичность родилась не из того, что маска исчезла, а из честного ее называния вслух. в момент произнесения появилось пространство, где быть и казаться совпали.","time":"1 разговор"},{"cat":"authentic","title":"цена маски","distinction":"образ, который вы держите, питается вашей же работоспособностью. снятая маска не отнимает силу — она возвращает ее туда, где вы ее растратили на притворство. это не слабость, а высвобождение.","question":"какой образ вы удерживаете прямо сейчас — и каким вкладом вы платите за то, чтобы его не уронить?","task":"возьмите ситуацию, где вы обычно держите образ, и войдите в нее как вы есть: скажите как есть, без отрепетированной версии себя, — и понаблюдайте, куда денется та энергия, что была заморожена в маске.","criterion":"вы заметили конкретный момент, когда импульс надеть образ возник — и вы его не надели. открыли-для-себя: после разговора чувствуете не опустошение от игры, а облегчение и ясность, которую съедала маска.","time":"1 день"},{"cat":"authentic","title":"слово и поступок","distinction":"аутентичность — это совпадение. вы аутентичны ровно когда тот, кем вы себя объявляете в речи, и тот, кем вы проживаетесь в действии, — один человек. разрыв между заявленным-собой и деянным-собой — мера того, что вы неаутентичны.","question":"что вы громко заявляете о себе в словах — и в каком конкретном действии сегодня этому противоречите?","task":"выберите одно свое заявление о себе («я честный», «я надежный», «люди мне важны») и совершите сегодня один поступок, который приводит дело в соответствие с ним; заметьте, что открывается в вас, когда слово и действие сходятся.","criterion":"вы можете назвать конкретное наблюдаемое действие, которое раньше расходилось с вашим заявлением о себе, а теперь совпало. открыли-для-себя разницу между намерением и совпавшим делом — как это проживается в теле.","time":"1 день"},{"cat":"authentic","title":"быть или казаться","distinction":"быть — это позиция, в которой заявленный-собой и проживаемый-собой совпадают. казаться — держать образ себя для других, позволяя ему закрывать то, что вы есть. тот разрыв, что возникает между этими позициями, — пространство неаутентичности.","question":"сколько сейчас вы занимаете энергии на то, как выглядите в чужих глазах, — вместо простого бытия тем, кто вы есть?","task":"найдите ситуацию, где вы бережете образ себя, и войдите в нее без него: скажите или сделайте то, что верно для вас, даже если образ рушится в глазах другого. понаблюдайте, что открывается, когда маска снята и вы видны как вы есть.","criterion":"вы заметили конкретный момент, где заняли позицию быть собой вместо позиции казаться. открыли-для-себя: без охраны образа стали ближе к человеку напротив и к самому делу — и это не опаснее, а свободнее.","time":"1 разговор"},{"cat":"authentic","title":"снять броню","distinction":"броня образа защищает не вас, а представление о вас. ею вы отрезаны от других и от дела. выбрать дело вместо образа значит занять позицию быть видимым: ошибающимся, не знающим, нуждающимся — такой, какой вы есть на деле.","question":"от какой позиции вы защищаетесь броней прямо сейчас — и что станет возможным для дела, если вы ее опустите?","task":"совершите сегодня один из двух речевых актов перед другим: признайте конкретную свою ошибку без оправданий, ИЛИ попросите о помощи в том, в чем раньше делали вид на собственные силы. заметьте, что происходит со связью и с делом, когда видимость возможна.","criterion":"вы прожили момент: прозвучало прямое «я ошибся в том-то» или «мне нужна помощь с этим» — без оправдания, без перекладывания, без смягчающей шутки. открыли-для-себя, что видимым быть не опаснее — оно свободнее и больше дает делу.","time":"1 разговор"},{"cat":"authentic","title":"выгода притворства","distinction":"маску вы носите не просто так. у каждого притворства есть скрытая выгода: правота, безопасность, право не рисковать, сочувствие других. пока вы не назовете эту выгоду как факт, образ держит вас невидимо, а не вы его видимо.","question":"что вы честно получаете от того, что продолжаете казаться вместо быть — и готовы ли вы назвать эту цену делу и себе?","task":"запишите одну привычную маску так: «я притворяюсь …, ради того чтобы получить …, а делу это стоит …». потом совершите речевой акт: озвучьте эту связку маска—выгода—цена вслух тому, кого она касается. понаблюдайте, как меняется власть образа, когда выгода названа.","criterion":"у вас есть записанная в словах связка маска—выгода—цена, и вы озвучили ее человеку, которого притворство затрагивает. открыли-для-себя: названная выгода перестала держать вас невидимо; теперь это ваш выбор, а не бессознательный механизм.","time":"15 минут"},{"cat":"bigger","title":"размер игры","distinction":"ваш размер как лидера определяет размер игры, в которую вы играете. маленькая игра — вы маленький, независимо от таланта внутри нее. когда контекст вашей приверженности становится больше вашей выгоды, появляется новый масштаб действия и нового вас в нем.","question":"в какой по размеру контекст вы играете сейчас — и не сместили ли вы его ставку вниз, к своему комфорту?","task":"запишите одну игру, в которую вы ведете сейчас, и переформулируйте ее ставку так: «это не про мой успех, это про ___» — назвав то, что больше вас. произнесите эту ставку вслух перед теми, кого она касается, и понаблюдайте, как трансформируется ваш размер в этой игре.","criterion":"вы открыли-для-себя контекст, который больше ваших границ, и заметили, как с его озвучиванием сменилось ваше ощущение собственного масштаба и доступные действия.","time":"20 минут"},{"cat":"bigger","title":"источник смелости","distinction":"смелость не рождается из вас. она приходит, когда дело, которому вы служите, становится важнее того, что вы рискуете потерять. приверженность Чему-то Большему, Чем Ты Сам возвращает вам силу, недоступную личной выгоде.","question":"есть ли у вас дело, ради которого вы готовы рискнуть своим образом — и из какого контекста вы это готовы сделать?","task":"найдите разговор, который откладываете из страха, и проведите его сегодня — начните не с оправдания, а с того, что больше: «я говорю это, потому что для меня важно ___» и назовите то Большее, ради чего вы идете на риск. понаблюдайте, откуда в вас берется голос для этих слов.","criterion":"вы прожили: страх присутствовал — но Большее перевесило, и вы открыли-для-себя, что смелость не явилась откуда-то, а появилась из того большего, чему вы служите.","time":"1 разговор"},{"cat":"bigger","title":"когда страх замолкает","distinction":"страх не отступает перед вашей волей. он молчит, когда дело и люди, для которых оно важно, становятся тяжелее вашего комфорта. страх при этом остается — но перестает быть тем, кто за рулем вашего действия.","question":"в какой момент сегодня вы позволяете решать за себя — страху или тому контексту, который вам по-настоящему важен?","task":"выберите действие, которое не совершаете из-за неудобства или страха, и сделайте его сегодня, держа фокус не на себе, а на людях и деле, для которых это имеет смысл. понаблюдайте в самом моменте: страх может оставаться в теле — но чей голос за рулем?","criterion":"вы прожили действие в присутствии дискомфорта и открыли-для-себя, что страх может жить в вас, но не быть тем, кто принимает решение.","time":"1 день"},{"cat":"bigger","title":"цель без тебя","distinction":"пока цель в центре вашей выгоды, признания и безопасности — вы ее граница и ее потолок. когда целиком служите тому, что больше вас, высвобождается мощь, которую личная выгода дать не способна. Что-то Большее, Чем Ты Сам требует другой формулировки цели.","question":"если убрать из вашей текущей цели все, что адресовано вашей личной выгоде и образу, что при этом останется?","task":"возьмите одну текущую задачу и переформулируйте ее цель так, чтобы в ней не было ни слова про вашу выгоду или успех — только про те люди и дело, которому она служит. произнесите эту переформулировку людям, работающим с вами, и внимательно отметьте: что меняется в вашей энергии и в ответе команды?","criterion":"вы открыли-для-себя цель, очищенную от личной выгоды, и при ее озвучивании заметили трансформацию собственной энергии — не истощение, а возгорание.","time":"15 минут"},{"cat":"bigger","title":"приверженность против предпочтения","distinction":"предпочтение работает, пока легко и приятно; приверженность держит вас в деле после того, как удовольствие испарилось. Чего-то Большего, Чем Ты Сам живет именно там, где вы остаетесь выполнять слово, когда настроение уже ушло.","question":"что из вашего заявленного — по-настоящему приверженность, а что только предпочтение, держащееся на эмоции и удобстве?","task":"выберите обещание, от которого сегодня хочется отступить, потому что исчезло вдохновение, и держите его ровно сегодня — а человеку, перед кем оно дано, скажите вслух: «держу свое слово, потому что для меня это означает ___», назвав то большее, за счет чего вы остаетесь. понаблюдайте, на чем вы держитесь, когда радость уже не светит.","criterion":"вы прожили выполнение обещания в день, когда хотелось его избежать, и открыли-для-себя разницу между приверженностью (держу, независимо) и предпочтением (держу, пока радостно).","time":"1 день"},{"cat":"bigger","title":"отдать авторство","distinction":"когда дело становится больше вас, вы отпускаете право быть его единственным автором. вы отдаете авторство и власть другим вслух — потому что важна игра и ее результаты, а не ваше место в истории успеха.","question":"за какую часть в словах «я это придумал / я это сделал / я это решу» вы держитесь так, что само дело от этого мельчает?","task":"найдите конкретную вещь, которую держите на себе ради значимости, и сегодня передайте ее другому человеку вслух — отдав ему и решение, и признание за этот кусок. скажите это при других, кто слышит. понаблюдайте с честностью: что происходит с делом и с вами в момент, когда авторство уходит к другому?","criterion":"вы открыли-для-себя: озвученная передача конкретной зоны ответственности и ее признания другому человеку не ослабила дело, а усилила — и вы почувствовали в теле разницу между личной значимостью и значимостью игры.","time":"1 разговор"},{"cat":"cause","title":"я — источник","distinction":"Быть Причиной Происходящего — не правда о том, кто виноват, а ваша декларация о способе-бытия: «я отношусь к этому так, будто все исходит из меня». вы не доказываете причинность — вы занимаете позицию, из которой появляется власть менять дальше.","question":"в какой застрявшей ситуации сегодня вы молча держитесь за контекст «это случилось со мной», вместо того чтобы объявить себя причиной?","task":"возьмите застрявшую ситуацию и вслух перед одним человеком совершите речевой акт признания: «я причина того, что…» — назвав свой конкретный вклад, без оправданий и без самобичевания. понаблюдайте, что при этом открывается для следующего действия.","criterion":"вы заметили, как со словами «я причина…» и названным своим вкладом — конкретным, а не обстоятельствами — проявилась власть менять дальше, появилась область действия, которая была закрыта.","time":"20 минут"},{"cat":"cause","title":"без виноватых","distinction":"поиск виноватого — себя или другого — дает вам правоту и забирает власть. вина держит вас в прошлом; Быть Причиной Происходящего развернуто в следующее действие. это не разные факты — это разные способы-бытия, разные позиции, из которых вы смотрите на одно и то же.","question":"кого вы прямо сейчас держите виноватым — себя или другого — и что эта правота дает вам взамен доступа к действию?","task":"поймайте себя на обвинении, и вместо проговаривания вины задайте себе или собеседнику один вопрос из позиции Быть Причиной Происходящего: «что здесь зависит от меня, и какой мой следующий ход?» — и проживите, как сдвигается само ощущение возможного.","criterion":"вы открыли-для-себя: в конкретном разговоре обвинение сменилось вопросом о следующем действии, и этот ход вдруг стал виден там, где только что было: «виноват» или «я ничего не могу».","time":"1 разговор"},{"cat":"cause","title":"жертва или автор","distinction":"жертва обстоятельств и автор смотрят на одни и те же факты. разница не в событиях, а в том, какую декларацию вы даете о себе: кем вы объявляете себя в этом событии. одно событие, два способа-бытия, два разных доступа к действию.","question":"где сегодня вы рассказываете историю из позиции «у меня не было выбора», хотя выбор был, только непривычен?","task":"возьмите одну сегодняшнюю жалобу и перепишите ее как речевой акт — предложением из позиции Быть Причиной Происходящего: «я выбрал…, потому что для меня было важнее…» — назвав, что вы на самом деле предпочли. заметьте, что происходит с вашим отношением к ситуации, когда жалоба становится выбором.","criterion":"вы прожили, как жалоба переформулировалась в выбор: «я выбрал, потому что важнее было…», и за ней проступил ваш реальный приоритет, который раньше был скрыт за историей.","time":"15 минут"},{"cat":"cause","title":"линия ответственности","distinction":"ответственность вы не находите в мире — вы ее проводите, как линию, и вслух заявляете: «отсюда и дальше — мое поле». там, где вы раньше останавливались на «это не моя зона», спрятан невидимый рычаг и невидимая граница того, что вам доступно менять.","question":"где проходит граница, за которой вы сегодня говорите «это уже не мое», и что раскроется, если вы сдвинете эту линию на один конкретный шаг?","task":"найдите дело, которое держите как «не свое», и возьмите из него один конкретный кусок на себя как свой — скажите об этом вслух тому, кого это касается: «эту часть я беру на себя» — и понаблюдайте, как линия ответственности сдвигается и что с ней открывается.","criterion":"вы заметили появление рычага в момент, когда вслух дали себя кому-то, объявив конкретную часть прежде чужого дела своей, и другой человек это услышал, принял или возразил — но линия была проведена.","time":"1 разговор"},{"cat":"cause","title":"первый ход","distinction":"пока вы объявляете себя причиной только на словах, рычаг не открывается, ситуация не сдвигается. рычаг появляется, когда вы перестаете ждать, что другой изменится первым, и совершаете действие сами — реальный ход, видимый другому. раньше его буквально не было.","question":"какой конкретный ход стал бы для вас очевидным, если бы вы перестали ждать, что первым изменится, переживет, заговорит — кто-то другой?","task":"возьмите проблему, где вы ждете движения от другого, и совершите сегодня свой ход первым — отправьте сообщение, задайте вопрос, начните разговор вслух, не дожидаясь их действия. не в голове, не в виде намерения — действие, которое видно другому. понаблюдайте, что сдвигается в самой ситуации, как только ход произошел.","criterion":"вы открыли-для-себя: действие, направленное наружу — отправленное, сказанное вслух сегодня — сдвинуло саму ситуацию, ее энергию, отношение другого человека. то, что казалось зависшим, получило движение от вас.","time":"1 день"},{"cat":"cause","title":"признать без оправданий","distinction":"признать свой вклад — не оправдываться и не каяться. оправдание защищает вашу правоту, покаяние топит вас в вине, обоих держат в прошлом. чистое признание просто называет: вот что сделал я — и это оставляет вас свободным для следующего действия, не завороженным прошлым.","question":"за каким объяснением «почему так вышло» вы скрываете простое, чистое признание «я это сделал»?","task":"выберите ситуацию, где вы дали маху, и совершите речевой акт признания прямо перед тем, кого это коснулось: «я это сделал» — без единого «но», без причин, без смягчающих обстоятельств и без «зато». потом назовите: что вы сделаете дальше. проживите, какая свобода появляется в теле и в отношениях, когда признание чистое.","criterion":"вы прожили признание без единого оправдания — и обнаружили: после слов «я это сделал» — ясная, видимая вам и другому — открылась свобода действовать дальше, появилось будущее.","time":"1 разговор"},{"cat":"oncourt","title":"сойди с трибуны","distinction":"с трибуны видно, как должно быть; На-поле вы действуете тем, что есть. ваше точное суждение о том, как надо, не двигает игру ни на сантиметр, пока вы в ней не заявитесь.","question":"где сегодня вы объясняете, как должно быть вслух, вместо того чтобы войти в разговор и сыграть из него?","task":"возьмите ситуацию, в которой вы комментируете со стороны, и проживите одно действие изнутри нее — произнесите речевой акт, без предварительного обоснования, почему это правильно. понаблюдайте, что открывается, когда вы На-поле.","criterion":"вы заметили, что появилось ваше совершенное действие в этой ситуации, а не более убедительная формулировка того, что должны сделать другие.","time":"1 действие"},{"cat":"oncourt","title":"объяснение — это трибуна","distinction":"объяснение, почему не получилось, всегда звучит разумно и звучит с трибуны. но разумность объяснения не меняет того, что игра остается не сыграна.","question":"какое ваше убедительное объяснение прямо сейчас держит вас вне игры и отлучает от момента действия?","task":"поймайте одно свое объяснение «почему пока невозможно» и вместо того, чтобы его доказывать, сделайте первый реальный ход туда, где объяснение вас не пускает. откройте-для-себя, как там на самом деле.","criterion":"вы можете назвать конкретный ход, сделанный сегодня вопреки объяснению, и заметили разницу между ним и более полной версией самого объяснения.","time":"30 минут"},{"cat":"oncourt","title":"лидерство в моменте","distinction":"лидерство не случается в подготовке до и в разборе после — только в самом моменте, в точке действия. между «собирался» и «разбирал» лежит узкая полоса, где вы либо были лидер На-поле, либо остались зритель На-трибунах.","question":"в каком моменте сегодня вы были На-поле в присутствии другого — и какие моменты вы упустили, потому что ушли в подготовку или в анализ задним числом?","task":"выберите разговор, в котором вы обычно готовитесь заранее или потом прокручиваете упущенное, и в самом моменте действия скажите вслух то, что обычно оставляете на «до» или «после». заметьте, что происходит в присутствии.","criterion":"вы прожили, как слова, которые вы держали в плане или в послемыслии, прозвучали вживую, в моменте действия, в разговоре с другим человеком.","time":"1 разговор"},{"cat":"oncourt","title":"заверши действием","distinction":"различение становится вашим не когда вы его поняли, а когда вы из него действуете в реальном моменте. понятое, но не прожитое в действии, остается объяснением с трибуны.","question":"какое различение вы уже помните наизусть, но ни разу не довели до того, чтобы из него проживать действие?","task":"возьмите различение из курса, которое вам ясно в формулировке, и сегодня совершите одно конкретное действие, которое становится возможным только из него. понаблюдайте, как это действие меняется, когда вы его совершаете из различения, а не вопреки ему.","criterion":"вы видите совершенное действие, про которое честно открывается: без этого различения я бы его не сделал так — а не пересказ того, какова его формулировка.","time":"1 действие"},{"cat":"oncourt","title":"счет, а не комментарий","distinction":"комментатор оценивает игру; игрок отвечает за счет. На-поле важно не то, насколько точно вы видите, что не так, а то, к какому результату вы сами движете счет от этой позиции.","question":"за какой конкретный результат сегодня вы взяли ответственность как игрок, а где остались в роли оценивающего комментатора, видящего проблему?","task":"в деле, которое идет не так, прекратите называть, что не так, и вместо этого объявите вслух результат, за который вы лично отвечаете как Причина Происходящего, — и сделайте ближайший ход к нему. заметьте, как смещается ваше место в игре.","criterion":"вы прожили, как объявили конкретный результат как свой и сделали к нему один видимый ход, не дав ни одного комментария «но проблема в том, что…».","time":"30 минут"},{"cat":"oncourt","title":"из игры, не про игру","distinction":"говорить про игру — это речь с трибуны, о «мы», «они», «надо бы». говорить из игры — это речевой акт из первого лица, в настоящем времени, в присутствии: «я делаю», «я прошу вас», «я обещаю к…».","question":"сколько раз сегодня вы говорили про ситуацию из третьего лица вместо того, чтобы говорить из нее от первого лица в моменте?","task":"в одном разговоре замените отстраненные формы («надо бы», «кто-то должен», «хорошо бы») на прямую речь из игры: «я сделаю это к…», «я прошу вас…» — произнесите это вслух собеседнику. понаблюдайте, как меняется разговор и что в нем открывается.","criterion":"вы заметили, что собеседник услышал от вас минимум одно обещание со сроком или прямую просьбу от первого лица, а не рассуждение о том, как должно быть.","time":"1 разговор"},{"cat":"context","title":"уже-всегда слушание","distinction":"еще до первого слова вы уже слушаете из готового контекстуального каркаса — из оценок, ожиданий и историй, которые о человеке вы уже держите. это уже-всегда слушание было там до разговора и определяет, какой мир он для вас открывает. смена этого фона меняет самого человека, которого вы встречаете.","question":"из какого скрытого контекстуального каркаса вы весь день слушаете этого человека, еще до того как он заговорит?","task":"перед разговором с конкретным человеком назовите про себя одной фразой контекст, в котором вы его держите («ненадежный», «спорит со мной», «свой»), и понаблюдайте, как этот контекст фильтрует то, что вы услышите в его словах.","criterion":"вы открыли-для-себя свой уже-всегда фон — и поймали хотя бы один момент, где услышали не то, что ожидали, а живое высказывание, которое он реально дал.","time":"1 разговор"},{"cat":"context","title":"контекст не факт","distinction":"факт — что произошло, оно одно; контекст — пространство смысла, в котором факт для вас живет и становится возможным. одно событие в контексте «меня подставили» и в контексте «мне дали материал для роста» рождает два разных способа-бытия и два разных ваших действия. факт не меняется — его контекстуальный каркас вы выбираете или он вас держит.","question":"какой факт сегодня вы держите в контексте, который вы сами же на него надели, принимая его за данность?","task":"возьмите одну сегодняшнюю неприятность, выпишите в одну строку голый факт без оценок, а во вторую — контекст, в котором вы его держите, и понаблюдайте, как контекст меняет мир вокруг факта.","criterion":"вы видите на бумаге две разные строки — факт и контекст, в котором он живет, — и открыли-для-себя, что второе можно заменить, первое остается.","time":"15 минут"},{"cat":"context","title":"создай контекст вслух","distinction":"контекст, который не задан словом, задается по умолчанию — из страха и прошлого. лидер не оставляет это на самотек: он создает контекст Тщательно Составленным Высказыванием, назвав вслух, ради чего вы здесь и внутри чего будет разговор, — и в этот момент, еще до содержания, люди уже живут в другом мире.","question":"какой контекст вы создадите Тщательно Составленным Высказыванием вместо того, что соберется из молчания?","task":"в начале одной встречи или звонка произнесите вслух одно Тщательно Составленное Высказывание о том, ради чего вы здесь, и каким будет этот разговор, — прежде чем перейти к содержанию, и заметьте, что произойдет с пространством.","criterion":"вы произнесли установочное высказывание до повестки и заметили, как люди откликнулись иначе — не в словах даже, а в тоне, в готовности слушать, в самом их присутствии.","time":"1 разговор"},{"cat":"context","title":"контекст, не действия","distinction":"когда вы тянете людей за действия, получаете сопротивление — каждый защищает свою правоту. когда вы создаете контекстуальный каркас, внутри которого нужное действие становится возможным и естественным, люди делают его сами. лидер не управляет через приказ — он творит контекст, и из этого контекста работоспособность рождается сама.","question":"где сегодня вы пытаетесь продавить действие, вместо того чтобы открыть доступ к миру, в котором это действие естественно?","task":"выберите задачу, которую хотите от человека, и вместо пошаговой инструкции создайте контекст: назовите вслух ради чего это важно и что станет возможным — а как он это сделает, оставьте ему; понаблюдайте, что он предложит.","criterion":"вы передали контекстуальный каркас и рамку без приказа, и человек сам предложил способ, а не ждал указаний — открыл-для-себя его собственный доступ к делу.","time":"1 разговор"},{"cat":"context","title":"контекст определяет возможное","distinction":"не способности и не внешние обстоятельства определяют, что возможно, а контекст, из которого вы смотрите на них. «это невозможно» и «как именно это сделать» — два разных контекстуальных каркаса вокруг одного и того же дела. смена контекста — речевой акт декларации, и мир по ту сторону слова иной.","question":"что стало бы возможным сегодня, если бы вы декларировали контекст: не «это не выйдет», а «это уже делается, вопрос как»?","task":"возьмите дело, которое вы держите как невозможное, и декларируйте его иначе вслух: «это происходит, вопрос в том, что нужно» — переформулируйте его в открытый вопрос и выпишите три первых шага; понаблюдайте, как сдвигается само поле возможного.","criterion":"вы открыли-для-себя три конкретных шага к тому, что минуту назад было за невидимой чертой, и ощутили смену доступа — от «нельзя» к «как».","time":"15 минут"},{"cat":"context","title":"смени свой контекстуальный каркас","distinction":"вы живете не просто в мире — вы живете внутри скрытого фона, контекстуального каркаса, которого не видите, как рыба не видит воду. он определяет каждый ваш поступок и каждое уже-всегда слушание. пока контекст спрятан, он вас управляет. названный — становится вашей декларацией и выбором.","question":"из какого скрытого контекстуального каркаса вы весь сегодняшний день живете, говорите и слушаете мир?","task":"вечером назовите про себя одним словом или коротко тот контекст, в котором прошел весь ваш день («нужно успеть», «меня не видят», «все под моим контролем»), и понаблюдайте, какие из ваших поступков этот контекст продиктовал, а вы их в моменте не заметили.","criterion":"вы назвали свой скрытый контекстуальный каркас явно и открыли-для-себя хотя бы один поступок, который он направлял, — контекст перестал быть невидимым.","time":"15 минут"},{"cat":"talk","title":"слово создает реальность","distinction":"в Разговорном Домене дела держатся на речи: то, что вы произносите, не описывает мир — оно его устанавливает. «у нас проблема» и «у нас есть задача» — два разных речевых акта, рождающих два разных доступа к будущему и двух разных вас в нем.","question":"какой речевой акт вы сейчас воспроизводите — и какую реальность этот акт для вас и для других разворачивает?","task":"поймайте одну свою привычную жалобу, которую сейчас произнесете вслух, и проживите, как звучит та же ситуация, переформулированная как факт плюс желаемый результат. заметьте, что открывается в собеседнике и в вас при смене речевого акта.","criterion":"вы услышали из собственных уст оба высказывания и открыли-для-себя, что во втором случае в комнате возникло иное будущее, и собеседник отозвался на него иначе.","time":"1 разговор"},{"cat":"talk","title":"проси, а не намекай","distinction":"в Разговорном Домене дело сдвигает речевой акт просьбы — явно сформулированный, адресованный конкретному человеку с названным сроком. надежда, что другой поймет сам, — это не действие, а ожидание: движение рождается только из четкой просьбы как высказывания, а не из намека.","question":"где вы ждете результата, держа в себе то, что так и не произнесли как прямую просьбу?","task":"возьмите одно зависшее дело и совершите речевой акт просьбы: обратитесь к конкретному человеку вслух, назвав что именно и к какому сроку, заметьте, как в ответ звучит «да», «нет» или предложение пересогласовать, а не молчание.","criterion":"вы прожили речевой акт просьбы, услышав в ответ явное согласие, отказ или встречное предложение — и заметили разницу между намеком и произнесенным высказыванием.","time":"15 минут"},{"cat":"talk","title":"обещание держит будущее","distinction":"обещание — речевой акт, которым вы объявляете себя Причиной Происходящего в будущем. размытое «постараюсь» не держит контекст; названный срок и названный адресат делают вас причиной того, что произойдет. это уже не намерение — это высказывание, на котором стоят другие.","question":"что вы называете обещанием в разговоре, где на деле говорите лишь намерение?","task":"дайте сегодня одно ясное обещание со сроком и конкретному человеку, произнесите его вслух; заметьте, как меняется ваше отношение к этому делу; тут же назовите, кого вы предупредите первым, если поймете, что не успеваете к сроку.","criterion":"вы открыли-для-себя разницу в самом себе: обещание со сроком, произнесенное вслух, держит вас иначе, чем намерение; вы уже знаете, кого оповестить о риске срыва, еще прежде чем срок наступит.","time":"15 минут"},{"cat":"talk","title":"заверши разговор","distinction":"в Разговорном Домене незавершенный разговор не исчезает — он тихо дергает вашу работоспособность из настоящего. завершение — это речевой акт, не про то, кто прав, а про то, чтобы разговор был сказан до конца и освободил силу для дальнейшего.","question":"какой разговор вы откладываете инициировать, и сколько вам каждый день стоит его молчание?","task":"найдите тот разговор, что висит дольше всего: инициируйте его, сказав или написав человеку прямо: «мне важно это с вами закрыть, когда сможем поговорить?» — и понаблюдайте, что освободится, когда разговор будет назначен или состоялся.","criterion":"вы прожили завершение как речевой акт: разговор либо состоялся сейчас, либо назван на конкретное время, и вы заметили, как тема перестала фоном занимать вашу внимательность.","time":"1 разговор"},{"cat":"talk","title":"декларация задает игру","distinction":"декларация — речевой акт, которым вы не описываете, как обстоят дела, а объявляете новое: вносите в мир новый контекст. «с этого момента мы так не делаем» — это не идея, а высказывание, рождающее новое бытие. лидер творит реальность словом вместо того, чтобы ждать, пока обстоятельства разрешат.","question":"какую игру вы готовы объявить вслух прямо сейчас — вместо того чтобы ждать подходящего момента?","task":"произнесите сегодня одну декларацию перед теми, кого она касается: назовите кратко, что отныне будет иначе и когда начинается этот сдвиг, и понаблюдайте, что меняется в самом моменте высказывания.","criterion":"вы открыли-для-себя силу декларации как речевого акта: она сказана людям явно, названа точка отсчета, и хотя бы один человек ее услышал, принял и подтвердил.","time":"1 разговор"},{"cat":"talk","title":"слушай как лидер","distinction":"в Разговорном Домене слушание — тоже речевой акт и тоже практика. вы слышите не слова напротив, а свое уже-всегда слушание, наложенное поверх них: готовый фон оценок, историй, ожиданий. слушать На-поле — значит на миг остановить эту машину и уловить, о чем человек просит на самом деле, прежде чем возражать.","question":"каким уже-всегда слушанием вы держите этого человека, и какую просьбу под его словами вы так и не услышали?","task":"в одном разговоре, прежде чем ответить, верните собеседнику его суть: «правильно ли я слышу, что вы просите…» — назвав то, что для вас проступило из его слов, и дождитесь, скажет ли он «да, именно» или поправит вас. только тогда дайте свой ответ.","criterion":"вы заметили свое уже-всегда слушание и прожили слушание иначе: переформулировали просьбу своими словами, собеседник подтвердил или поправил вас — и в этом переформулировании открылась правда, которая была под словами.","time":"1 разговор"},{"cat":"discover","title":"не поверь — заметь","distinction":"различение из курса не действует, пока вы в него верите на словах. оно пробуждается в тот момент, когда вы находите его живьем — в своем опыте, как это проживается прямо сейчас, а не как пересказ определения. убеждение остается лингвистической абстракцией; опознание в ситуации становится доступом к различению.","question":"какое различение из курса вы сейчас носите как верное понимание, но ни разу не видели, как оно проявляется в вашем действии?","task":"возьмите одно понятие с занятия и неделю наблюдайте: где оно реально проявилось в вашей жизни? откройте-для-себя конкретный эпизод со всеми деталями — дата, место, что вы делали, как это проживалось, — и запишите его.","criterion":"вы нашли и записали один реальный случай, где различение живо совершилось в вас, а не пересказ определения из материала или подтверждение теории.","time":"15 минут"},{"cat":"discover","title":"слепое пятно","distinction":"слепое пятно — это то, что вы не видите, и одновременно не видите, что не видите. вы сами до него не дотянетесь: его видно только с чужого ракурса, из другого контекстуального каркаса. это место, где конструкция, которой вы являетесь, сама себя закрывает от себя.","question":"что вы делаете систематически, чего сами ни разу не заметили, и что при этом происходит с людьми рядом?","task":"спросите человека, который часто вас наблюдает, прямо: «что я делаю, чего сам не вижу и что мешает другим?» — и молча выслушайте до конца, заметив в себе возникающие защиты и порывы оправдаться.","criterion":"вы услышали минимум одну вещь, которая вас удивила или затронула глубоко, и заметили в себе реакцию — защиту, отрицание, обоснование — но не пошли за ней, а остались с услышанным.","time":"1 разговор"},{"cat":"discover","title":"сила вопроса","distinction":"мощь лидера не в готовых ответах, а в качестве вопросов, которые он в мир запускает. вопрос — это речевой акт, который либо закрывает тему в привычный смысл, либо открывает то, чего до сей поры было не видно. слабый вопрос утверждает; сильный вопрос расширяет границы возможного.","question":"какой вопрос вы обычно не решаетесь задать, потому что боитесь ответа, который откроется?","task":"в одном разговоре замените свой обычный совет или объяснение на открытый вопрос, дайте собеседнику полностью развить ответ без подсказок, и понаблюдайте, куда потечет разговор и что при этом произойдет с вами.","criterion":"вы открыли-для-себя, что разговор пошел туда, куда вы не планировали; собеседник сказал о том, чего не планировал говорить, — и вы почувствовали в себе сдвиг.","time":"1 разговор"},{"cat":"discover","title":"прожито, а не понято","distinction":"понять идею головой и прожить ее в теле, в моменте — два совершенно разных события. различение становится вашим не тогда, когда вы его припомните после, а только когда опознаете его в живой ситуации, как это происходит в реальном времени. запоздалое понимание — это еще интеллектуальная абстракция; одновременное опознание — это уже доступ к действию.","question":"что из курса вы можете повторить наизусть, но ни разу не поймали в самом моменте, пока это совершалось?","task":"выберите одно различение и сегодня поймайте момент, когда оно случается прямо сейчас — назовите его про себя в ту же секунду, не задним числом, и заметьте, что при этом открывается в вашем ощущении ситуации и в вашей способности действовать.","criterion":"вы поймали различение в реальном времени, по ходу события, и можете рассказать, что прожили тогда — не о значении слова, а о том, как это было внутри и извне.","time":"1 день"},{"cat":"discover","title":"контрпример себе","distinction":"когда вы убеждены, что утверждение про вас верно «всегда» — вы уже перестали смотреть на мир и на себя. убеждение становится стеклом, сквозь которое вы видите только подтверждения. живой опыт проверяется не накоплением доказательств «я прав», а честным поиском случая, где было иначе, — и готовностью его увидеть.","question":"где вы строите про себя историю, в которую крепко верите, и потому не видите противоречащие ей факты?","task":"возьмите одно твердое утверждение о себе («я всегда…», «я никогда…», «я не такой…») и на этой неделе активно ищите в своем опыте один конкретный случай, который ему противоречит — откройте-для-себя и запишите его со всеми деталями.","criterion":"вы нашли и записали контрпример, который вас удивил или затронул, — а не доказали себе еще раз, что вы были правы, или объяснили, почему исключение подтверждает правило.","time":"15 минут"},{"cat":"discover","title":"зеркало обратной связи","distinction":"то, как вы себя ощущаете внутри, и то, как вы проявляетесь для других, — почти никогда не совпадают. этот зазор — не ошибка восприятия, а место, где живет доступ к иному видению себя. разрыв между ощущаемым-собой и видимым-другому — и есть место, где живет открытие про себя.","question":"каким вас видят люди в вашем деле, и насколько это расходится с тем, кем вы себя ощущаете и считаете?","task":"попросите двух разных людей, которые вас хорошо наблюдают, описать тремя словами, каким вы бываете в работе и в отношениях; запишите их слова дословно, потом рядом напишите три своих слова о себе, и долго смотрите на расхождение, заметив, что в вас при этом возникает.","criterion":"вы держите три чужих слова рядом со своими тремя и открыли-для-себя конкретное расхождение — узнали о себе то, чего не ожидали, и не спешите это объяснять или защищаться от него.","time":"2 разговора"}];

    do{ pick=p[Math.floor(Math.random()*p.length)]; g++; }while(pick.id===lastDrawn&&g<25); lastDrawn=pick.id; save(KEY.last,lastDrawn); return[pick]; }
  function drawSpread(){ var p=pool(),out=[],used={}; while(out.length<Math.min(3,p.length)){ var i=Math.floor(Math.random()*p.length); if(!used[i]){used[i]=1;out.push(p[i]);} } return out; }

  function faceNode(card,side){

    var cbtns=scene.querySelectorAll("[data-copy]"); for(var j=0;j<cbtns.length;j++)(function(b){ b.addEventListener("click",function(e){ e.stopPropagation(); copyCard(card,cardEl); }); })(cbtns[j]);

    var body=el("div","sheet-body");
    var h="";
    h+='<p class="hP" style="margin-top:16px">Это колода различений подхода «Бытие Лидерства». Каждая карта — одно различение лидера: сначала вы <b style="color:var(--txt)">открываете-для-себя</b> его, потом <b style="color:var(--txt)">проживаете</b> в действии. Это не набор техник, а сдвиг бытия, из которого действие следует само.</p>';
    h+='<div class="hH">анатомия карты</div><div class="hT">Одна карта — две стороны</div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px">'
      +'<div class="hcard"><b>ЛИЦО</b><span class="hP" style="margin:0">Различение и вопрос дня. Прочитайте и побудьте с вопросом — это про бытие: кем вы есть в этом различении.</span></div>'
      +'<div class="hcard"><b>ОБОРОТ</b><span class="hP" style="margin:0">Полевой эксперимент и критерий. Нажмите на карту, чтобы перевернуть — это про действие, которое естественно следует из различения, а не «домашка».</span></div></div>';
    h+='<div class="hH">две группы · 8 областей</div><div class="hT">Фундамент и Доступ</div>';
    h+='<p class="hP">Первые четыре области — <b style="color:var(--txt)">Фундамент</b>: кто вы как лидер (четыре фактора). Остальные четыре — <b style="color:var(--txt)">Доступ</b>: как лидерство проявляется в контексте, на-поле, в разговоре и в опыте.</p>';
    h+='<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">';
    ["Фундамент","Доступ"].forEach(function(tier){
      h+='<div><div style="font:600 9px/1 var(--sans);letter-spacing:.22em;text-transform:uppercase;color:var(--mut);margin-bottom:6px">'+tier+'</div><div style="display:flex;flex-wrap:wrap;gap:8px">'
        +Object.keys(CATS).filter(function(id){return CATS[id].tier===tier;}).map(function(id){return '<span style="display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font:500 12.5px/1 var(--sans);color:var(--txt)"><span style="width:8px;height:8px;border-radius:50%;background:'+CATS[id].color+'"></span>'+esc(CATS[id].name)+'</span>';}).join("")
        +'</div></div>';
    });
    h+='</div>';
    h+='<div class="hH">способы работы</div><div class="hT">Пять способов вытянуть</div>';
    var ways=[["Карта дня","одна на сегодня, общая для всех — меняется раз в день."],["Вытянуть карту","случайная из выбранной области, когда нужен импульс."],["Расклад «Ход»","три карты: Ситуация · Слепое пятно · Следующий ход."],["Путь по колоде","пройти всю колоду по порядку, область за областью."],["Журнал","история вытянутых карт — вернуться к любой."]];
    h+='<div style="display:flex;flex-direction:column">'+ways.map(function(w){return '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)"><b style="color:var(--txt);font:600 13.5px/1.4 var(--sans);flex:0 0 38%">'+w[0]+'</b><span class="hP" style="margin:0">'+w[1]+'</span></div>';}).join("")+'</div>';
    h+='<div class="hH">ритуал</div><div class="hT">Как с этим жить</div>';
    var steps=["Прочитайте лицо и побудьте с вопросом дня.","Переверните карту — получите полевой эксперимент.","Проживите его сегодня: в реальном разговоре или деле.","Сверьтесь с критерием — что вы заметили и открыли-для-себя.","Отметьте ♥ то, к чему хотите вернуться, и приходите завтра."];
    h+='<div style="display:flex;flex-direction:column;gap:11px">'+steps.map(function(s,i){return '<div style="display:flex;gap:12px;align-items:flex-start"><span style="flex:0 0 auto;width:25px;height:25px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font:600 12px/23px var(--sans);text-align:center">'+(i+1)+'</span><span class="hP" style="margin:0;padding-top:2px">'+s+'</span></div>';}).join("")+'</div>';
    body.innerHTML=h;
    var foot=el("div","sheet-foot");
    var cta=el("button","btn primary","Понятно — начать"); cta.style.width="100%"; foot.appendChild(cta);
    sheet.appendChild(head); sheet.appendChild(body); sheet.appendChild(foot); ov.appendChild(sheet); document.getElementById("app").appendChild(ov);
    function close(){ ov.remove(); }
    ov.addEventListener("click",function(e){ if(e.target===ov)close(); });
    cl.addEventListener("click",close); cta.addEventListener("click",close);
  }

  // ---- render ----
  var stage;
  function flipHint(){ return el("div","flip-hint",'<span style="font-size:13px">↻</span> нажмите, чтобы перевернуть'); }
  function renderCards(cards,roles){
    stage.innerHTML="";
    if(!cards||!cards.length||!cards[0]){ stage.appendChild(el("div","empty",emptyMsg())); return; }
    for(var i=0;i<cards.length;i++){ var col=el("div","col");
      if(roles) col.appendChild(el("div","role",esc(roles[i])));
      col.appendChild(cardScene(cards[i],!!roles)); col.appendChild(flipHint());
      stage.appendChild(col); }
  }
  function act(a,silent){ view="cards"; lastAction=a; var cards=[],roles=null;
    if(a==="day"){ var c=cardOfDay(); cards=[c]; dayMark={date:todayLocal(),id:c.id}; save(KEY.day,dayMark); }
    else if(a==="draw") cards=drawOne();
    else if(a==="spread"){ cards=drawSpread(); roles=ROLES; }
    current={cards:cards,roles:roles}; if(!silent) addHistory(cards,a); renderActions(); renderCards(cards,roles); }

  // ---- path ----
  function pathScope(){ return filter===null?"all":filter; }
  function pathGet(){ return pathState[pathScope()]||0; }
  function pathSet(i){ pathState[pathScope()]=i; save(KEY.path,pathState); }
  function showPath(){ view="path"; renderActions(); renderPath(); }
  function pathStep(d){ if(view!=="path")return; var p=pool(); if(!p.length)return; var pos=Math.max(0,Math.min(pathGet()+d,p.length-1)); pathSet(pos); renderPath(); }
  function renderPath(){
    stage.innerHTML=""; var p=pool();
    if(!p.length){ stage.appendChild(el("div","empty",emptyMsg())); return; }
    var pos=Math.max(0,Math.min(pathGet(),p.length-1)); pathSet(pos);
    var card=p[pos], cat=CATS[card.cat];
    var catCards=p.filter(function(c){return c.cat===card.cat;}), idxInCat=catCards.indexOf(card)+1;
    var ctx=el("div","pathctx");
    ctx.innerHTML='<div class="k">путь по колоде · по порядку</div><div class="v"><span style="display:inline-flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:'+cat.color+';box-shadow:0 0 8px '+hexA(cat.color,.7)+'"></span>'+esc(cat.name)+' · '+idxInCat+' / '+catCards.length+'</span><span style="color:var(--mut);font-weight:400">карта '+(pos+1)+' из '+p.length+'</span></div>';
    stage.appendChild(ctx);
    var col=el("div","col"); col.style.flexBasis="100%"; col.appendChild(cardScene(card,false)); stage.appendChild(col);
    var barColor=(filter&&filter!=="fav")?CATS[filter].color:"#ece1c8";
    var nav=el("div","pathnav");
    var prev=el("button","navarrow"); prev.innerHTML="‹"; prev.setAttribute("aria-label","Предыдущая карта");
    var next=el("button","navarrow"); next.innerHTML="›"; next.setAttribute("aria-label","Следующая карта");
    if(pos===0)prev.disabled=true; if(pos===p.length-1)next.disabled=true;
    prev.addEventListener("click",function(){ pathStep(-1); }); next.addEventListener("click",function(){ pathStep(1); });
    var posd=el("div","navpos");
    posd.innerHTML='<div class="pn">'+(pos+1)+' / '+p.length+'</div><div class="bar"><span style="width:'+Math.round((pos+1)/p.length*100)+'%;background:'+barColor+'"></span></div>';
    nav.appendChild(prev); nav.appendChild(posd); nav.appendChild(next); stage.appendChild(nav);
    stage.appendChild(el("div","flip-hint",'<span style="font-size:13px">↻</span> нажмите на карту, чтобы перевернуть'));
  }

  // ---- chrome ----
  var catsWrap, actionsWrap;
  function buildCats(){
    catsWrap.innerHTML="";
    function chip(f,label){ var on=(f===filter)||(f===null&&filter===null);
      var b=el("button","chip"+(on?" on":""),label);
      if(f&&f!=="fav"&&on) b.style.borderColor=hexA(CATS[f].color,.6);
      b.addEventListener("click",function(){ chooseFilter(f); }); catsWrap.appendChild(b); }
    function lab(t){ catsWrap.appendChild(el("div","catlabel",esc(t))); }
    chip(null,"Все");
    chip("fav",'<span class="dot" style="background:#e0608a"></span>♥ Избранное'+(favs.length?' <span class="cnt">'+favs.length+'</span>':''));
    lab("Фундамент · кто вы как лидер");
    Object.keys(CATS).filter(function(id){return CATS[id].tier==="Фундамент";}).forEach(function(id){ chip(id,'<span class="dot" style="background:'+CATS[id].color+'"></span>'+esc(CATS[id].name)); });
    lab("Доступ · как лидерство проявляется");
    Object.keys(CATS).filter(function(id){return CATS[id].tier==="Доступ";}).forEach(function(id){ chip(id,'<span class="dot" style="background:'+CATS[id].color+'"></span>'+esc(CATS[id].name)); });
  }
  function renderActions(){
    actionsWrap.innerHTML=""; var today=dayMark&&dayMark.date===todayLocal();
    var defs=[{a:"day",html:"Карта дня"+(today?' <span class="mini">✓ сегодня</span>':""),primary:true},
      {a:"draw",html:"Вытянуть карту"},{a:"spread",html:"Расклад «Ход»"},
      {a:"path",html:"🧭 Путь по колоде",on:view==="path"},{a:"journal",html:"⌚ Журнал"}];
    defs.forEach(function(d){ var b=el("button","btn"+(d.primary?" primary":"")+(d.on?" on":""),d.html);
      b.addEventListener("click",function(){ handleAction(d.a); }); actionsWrap.appendChild(b); });
  }
  function handleAction(a){ if(a==="journal"){ openJournal(); return; } if(a==="path"){ view==="path"?act(lastAction):showPath(); return; } act(a); }
  function chooseFilter(f){ filter=(filter===f)?null:f; buildCats(); syncToggle(); if(view==="path")renderPath(); else act(lastAction==="day"?"draw":lastAction); }
  function filterLabel(){ return filter===null?"все области":(filter==="fav"?"♥ избранное":CATS[filter].name.toLowerCase()); }
  function syncToggle(){ if(!ftoggleEl)return; ftoggleEl.innerHTML='области · '+esc(filterLabel())+' <span class="caret">'+(catsOpen?"▴":"▾")+'</span>'; }

  // ---- build chrome ----
  var app=document.getElementById("app"); app.innerHTML="";
  var wrap=el("div"); wrap.style.cssText="max-width:980px;margin:0 auto;position:relative";
  var header=el("div","header");
  header.innerHTML='<div class="eyebrow">колода различений · 48 карт</div><h1>Бытие Лидерства</h1><p class="tagline">увидеть · прожить · стать</p>';
  var controls=el("div","controls");
  var help=el("button","ctl",'<span class="q">?</span> Как пользоваться'); help.addEventListener("click",openHelp);
  var ftoggle=el("button","ctl"); ftoggleEl=ftoggle;
  ftoggle.addEventListener("click",function(){ catsOpen=!catsOpen; save(KEY.cats,catsOpen); catsWrap.className="cats"+(catsOpen?"":" collapsed"); syncToggle(); });
  controls.appendChild(help); controls.appendChild(ftoggle);
  catsWrap=el("div","cats"+(catsOpen?"":" collapsed")); actionsWrap=el("div","actions"); stage=el("div","stage");
  wrap.appendChild(header); wrap.appendChild(controls); wrap.appendChild(catsWrap); wrap.appendChild(actionsWrap); wrap.appendChild(stage);
  app.appendChild(wrap);
  syncToggle();

  // (наклон по курсору убран — он ставил инлайн-transform на карту и перебивал переворот)

  // ---- keyboard ----
  window.addEventListener("keydown",function(e){
    var ov=document.querySelector("[data-ov]"); if(ov){ if(e.key==="Escape")ov.remove(); return; }
    if(view==="path"){ if(e.key==="ArrowLeft"){ e.preventDefault(); pathStep(-1); } else if(e.key==="ArrowRight"){ e.preventDefault(); pathStep(1); } }
  });

  // ---- init ----
  buildCats(); act("day");
  if(!load(KEY.intro,0)) setTimeout(openHelp,400);
})();
</script>
</body>
</html>
