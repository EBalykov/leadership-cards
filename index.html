<style>
  :root{
    --bg:#100d08; --txt:#ece4d3; --mut:#9b917c; --line:rgba(236,228,211,.13);
    --panel:rgba(236,228,211,.055); --panel2:rgba(236,228,211,.11);
    --cream-a:#fdf9f1; --cream-b:#efe6d4; --ink:#26211a; --cmut:#9b9079;
    --sans:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
    --serif:'Spectral',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:
      radial-gradient(1200px 720px at 50% -12%, #2c2618 0%, rgba(44,38,24,0) 60%),
      radial-gradient(960px 620px at 88% 116%, #1f2a2c 0%, rgba(31,42,44,0) 55%),
      linear-gradient(180deg,#15120b 0%,#100d08 100%);
    background-color:var(--bg); color:var(--txt); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; line-height:1.55; min-height:100vh; min-height:100dvh;
    padding:max(22px,env(safe-area-inset-top)) 16px calc(56px + env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  .wrap{max-width:980px;margin:0 auto}
  .header{text-align:center;margin:2px 0 11px}
  .eyebrow{font:600 9.5px/1 var(--sans);letter-spacing:.34em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  h1{font:500 clamp(26px,6.4vw,38px)/1.04 var(--serif);margin:0;letter-spacing:.01em;color:var(--txt)}
  .tagline{margin:7px 0 0;color:var(--mut);font:400 13px/1.5 var(--sans)}

  .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:0 auto 14px}
  .ctl{display:inline-flex;align-items:center;gap:8px;padding:9px 15px;border-radius:999px;border:1px solid var(--line);
    background:var(--panel);color:var(--txt);cursor:pointer;font:500 12.5px/1 var(--sans);min-height:42px}
  .ctl .q{display:inline-flex;width:16px;height:16px;border-radius:50%;border:1px solid rgba(236,228,211,.5);align-items:center;justify-content:center;font:600 10px/1 var(--sans)}
  .ctl .caret{color:var(--mut);font-size:11px}

  .cats{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;max-width:820px;margin:0 auto 16px}
  .cats.collapsed{display:none}
  .catlabel{flex-basis:100%;text-align:center;font:600 9px/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--mut);margin:7px 0 1px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);
    background:transparent;color:var(--mut);cursor:pointer;font:500 12.5px/1.1 var(--sans);white-space:nowrap;min-height:36px}
  .chip.on{background:var(--panel);color:var(--txt)}
  .chip .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .chip .cnt{color:var(--mut);font-size:11px}

  .actions{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:4px auto 26px}
  .btn{padding:11px 16px;border-radius:13px;cursor:pointer;font:600 13.5px/1.1 var(--sans);min-height:46px;
    border:1px solid var(--line);background:var(--panel);color:var(--txt);display:inline-flex;align-items:center;gap:6px;justify-content:center}
  .btn.primary{border:none;background:linear-gradient(180deg,#fbf6ea,#ece0c6);color:#241f16;box-shadow:0 10px 26px -10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.6)}
  .btn.on{box-shadow:inset 0 0 0 1px rgba(236,225,200,.4)}
  .btn:disabled{opacity:.4;cursor:default}
  .btn .mini{font-size:11px;opacity:.8;font-weight:500}

  .stage{display:flex;gap:18px;justify-content:center;align-items:flex-start;flex-wrap:wrap;min-height:60vh}
  .col{display:flex;flex-direction:column;align-items:center;gap:9px;max-width:100%}
  .role{font:600 10.5px/1 var(--sans);letter-spacing:.12em;text-transform:uppercase;color:var(--mut);text-align:center}
  .pathctx{flex-basis:100%;text-align:center;margin-bottom:-2px}
  .pathctx .k{font:600 10px/1 var(--sans);letter-spacing:.3em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  .pathctx .v{display:inline-flex;align-items:center;gap:9px;font:500 13.5px/1 var(--sans);color:var(--txt);flex-wrap:wrap;justify-content:center}

  .scene{width:min(92vw,358px);perspective:1500px;opacity:1;animation:deal .5s ease both}
  .scene.small{width:min(78vw,250px)}
  /* появление ТОЛЬКО через transform — без opacity, чтобы карта была видна даже если браузер/webview ставит анимации на паузу */
  @keyframes deal{from{transform:translateY(12px)}to{transform:none}}
  .card{position:relative;display:grid;width:100%;min-height:clamp(430px,68vh,520px);
    transform-style:preserve-3d;-webkit-transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.4,.1,.2,1);transform:rotateY(0);cursor:pointer;border-radius:24px}
  .scene.small .card{min-height:clamp(370px,56vh,430px)}
  .card.flip{transform:rotateY(180deg)}
  .card:focus-visible{outline:2px solid rgba(236,225,200,.6);outline-offset:4px}
  .face{grid-area:1/1;-webkit-backface-visibility:hidden;backface-visibility:hidden;transform:rotateY(0);
    border-radius:24px;padding:1.6px;position:relative;
    box-shadow:0 24px 60px -24px rgba(0,0,0,.5),0 16px 44px -18px rgba(0,0,0,.72)}
  .face.back{transform:rotateY(180deg)}
  .inner{position:relative;overflow:hidden;border-radius:22.5px;height:100%;
    background:linear-gradient(162deg,var(--cream-a),var(--cream-b));
    padding:clamp(17px,4.4vw,22px);display:flex;flex-direction:column}
  .holo{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light;background-size:200% 200%;
    background-position:0% 50%;animation:holo 9s ease-in-out infinite;z-index:1}
  .sheen{position:absolute;inset:0;pointer-events:none;z-index:3;mix-blend-mode:screen;opacity:.7;
    background:linear-gradient(105deg,transparent 36%,rgba(255,255,255,.5) 46%,rgba(255,255,255,.92) 50%,rgba(255,255,255,.5) 54%,transparent 64%);
    background-size:250% 100%;background-position:175% 0;animation:sheen 6.5s linear infinite}
  @keyframes holo{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes sheen{0%{background-position:175% 0}55%{background-position:-75% 0}100%{background-position:-75% 0}}
  .content{position:relative;z-index:2;display:flex;flex-direction:column;flex:1 1 auto}

  .c-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
  .badge{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
    background:rgba(34,29,20,.05);border:1px solid rgba(34,29,20,.1);font:600 11.5px/1.3 var(--sans);color:var(--ink)}
  .badge .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .tools{display:flex;align-items:center;gap:2px;flex:0 0 auto}
  .num{font:500 11.5px/1 var(--sans);color:var(--cmut);margin-left:3px;white-space:nowrap}
  .icobtn{width:38px;height:38px;min-width:38px;display:inline-flex;align-items:center;justify-content:center;
    border:none;background:transparent;color:var(--cmut);cursor:pointer;border-radius:10px;font-size:18px;line-height:1;padding:0}
  .icobtn.on{color:#e0608a}
  .glyph{align-self:center;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;margin:6px 0 9px}
  .c-title{font:600 clamp(20px,5.2vw,25px)/1.18 var(--serif);color:var(--ink);text-align:center;margin:0 0 10px}
  .divider{width:38px;height:2px;margin:0 auto 15px;border-radius:2px}
  .label{font:600 10.5px/1.4 var(--sans);letter-spacing:.14em;text-transform:uppercase;color:var(--cmut);margin-bottom:5px}
  .text{font:400 15px/1.52 var(--serif);color:var(--ink);margin:0 0 13px}
  .text.q{font-style:italic}
  .crit{display:flex;gap:8px;align-items:flex-start;margin:0 0 13px}
  .crit .ok{color:#0f8a5f;font-weight:700;flex:0 0 auto}
  .crit span:last-child{font:400 14.5px/1.5 var(--serif);color:var(--ink)}
  .foot{margin-top:auto;padding-top:12px;border-top:1px solid rgba(34,29,20,.1);display:flex;justify-content:space-between;align-items:center;gap:8px;font:500 10.5px/1.3 var(--sans);color:var(--cmut)}
  .foot .src{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}
  .flip-hint{display:inline-flex;align-items:center;gap:7px;align-self:center;padding:6px 13px;border-radius:999px;background:var(--panel);border:1px solid var(--line);color:var(--mut);font:500 11.5px/1 var(--sans)}

  .pathnav{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;max-width:400px;margin:2px auto 0;flex-basis:100%}
  .navarrow{flex:0 0 auto;width:52px;height:52px;border-radius:50%;border:1px solid var(--line);background:var(--panel);
    color:var(--txt);cursor:pointer;font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center}
  .navarrow:active{background:var(--panel2)}
  .navarrow:disabled{opacity:.3;cursor:default}
  .navpos{flex:1 1 auto;text-align:center;max-width:200px}
  .navpos .pn{font:600 13px/1 var(--sans);color:var(--txt);margin-bottom:6px}
  .navpos .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden}
  .navpos .bar span{display:block;height:100%}
  .empty{color:var(--mut);align-self:center;text-align:center;padding:70px 16px;max-width:320px;font:400 15px/1.6 var(--sans)}

  .overlay{position:fixed;inset:0;background:rgba(12,9,4,.64);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
    display:flex;align-items:flex-end;justify-content:center;z-index:50}
  @media(min-width:600px){.overlay{align-items:center}}
  .sheet{background:linear-gradient(180deg,#1c1810,#141009);width:100%;max-width:600px;max-height:88vh;
    border:1px solid var(--line);border-radius:20px 20px 0 0;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -24px 70px rgba(0,0,0,.55)}
  @media(min-width:600px){.sheet{border-radius:20px}}
  .sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:18px 20px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .sheet-body{overflow:auto;padding:2px 20px 8px}
  .sheet-foot{flex:0 0 auto;padding:14px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--line)}
  .jrow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:transparent;color:var(--txt);cursor:pointer;padding:11px 12px;border-radius:12px;font:inherit}
  .jrow .jg{font-size:20px;flex:0 0 auto}
  .jrow .jt{flex:1;font:500 14px/1.35 var(--sans)}
  .jrow .jm{font:500 12px/1.3 var(--sans);color:var(--mut);white-space:nowrap}
  .hP{color:rgba(236,228,211,.82);font:400 14px/1.62 var(--sans);margin:0 0 6px}
  .hH{font:600 9.5px/1 var(--sans);letter-spacing:.22em;text-transform:uppercase;color:var(--mut);margin:24px 0 7px}
  .hT{font:500 17px/1.25 var(--serif);color:var(--txt);margin-bottom:10px}
  .hcard{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
  .hcard b{font:600 11px/1.5 var(--sans);color:#e9d9b0;letter-spacing:.05em;flex:0 0 auto;width:56px}

  .toast{position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
    background:linear-gradient(180deg,#fbf6ea,#ece0c6);color:#241f16;padding:11px 20px;border-radius:999px;font:600 14px/1 var(--sans);
    opacity:0;pointer-events:none;transition:.22s;z-index:60;box-shadow:0 12px 30px -10px rgba(0,0,0,.6)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  :focus-visible{outline:2px solid rgba(236,225,200,.55);outline-offset:3px}
  @media(prefers-reduced-motion:reduce){
    .scene{animation:none}.card{transition:none}.holo,.sheen{animation:none}
  }
</style>
</head>

  var CARDS = [{"cat":"integrity","title":"честь слова, не мораль","distinction":"Целостность — не про «хорошо/плохо» и не про этику, а про целостность: держит ли конструкция, которой вы являетесь. сдержанное слово делает вас цельным независимо от того, благое оно или нет.","question":"где сегодня вы путаете «я хороший» с «я цельный» — и прячетесь за моралью вместо честного взгляда, держите ли вы свое слово?","task":"возьмите одно свое невыполненное обещание и проживите момент, проговорив вслух самому себе: «я не сдержал слово» — без оправдания, без «но обстоятельства», без оценки себя как плохого. понаблюдайте, что происходит внутри.","criterion":"вы заметили, что назвали факт нарушения слова и не скатились ни в самобичевание, ни в оправдание — осталась чистая констатация.","time":"15 минут"},{"cat":"integrity","title":"слово роняет работоспособность","distinction":"нарушенное слово — не моральный проступок, а падение работоспособности: конструкция перестает держать нагрузку. там, где слово не держится, дело буксует, и причина не в людях, а в трещине.","question":"какая буксующая задача на самом деле держится на чьем-то фактически провисшем слове?","task":"выберите дело, которое «почему-то не двигается», и откройте-для-себя в нем конкретное провисшее слово — чье именно обещание не выполнено. запишите его одной фразой.","criterion":"вы обнаружили точное невыполненное обещание за пробуксовкой и можете показать на него пальцем, а не на «нехватку времени» или «лень».","time":"20 минут"},{"cat":"integrity","title":"честное «нет»","distinction":"«да», которое вы не выполните, дороже честного отказа. согласие, данное чтобы не разочаровывать, — это уже нарушенное слово, отложенное на потом.","question":"какому «да» сегодня вы говорите, заранее зная внутри, что не сдержите его, — лишь бы сейчас не было неловко?","task":"в одном разговоре, где вас просят о невыполнимом, попробуйте сказать прямое «нет» или «я не могу этого обещать» вместо вежливого согласия — и понаблюдайте, что при этом происходит с вами и с другим.","criterion":"вы заметили, как вслух отказали или честно обозначили границу там, где раньше согласились бы автоматически, — и не смягчили это ложным «как-нибудь потом».","time":"1 разговор"},{"cat":"integrity","title":"восстановление слова","distinction":"цельность не в том, чтобы никогда не нарушать слово, а в том, чтобы восстанавливать его. восстановление — не извинение, а признание факта, разбор последствий для другого и новое слово.","question":"чье нарушенное вами слово вы до сих пор не восстановили, потому что застряли в стыде вместо того, чтобы навести порядок?","task":"выберите одно нарушенное обещание и проживите восстановление с человеком: скажите, что нарушили слово, спросите, чем это аукнулось ему, и дайте конкретное новое слово. заметьте, что меняется в отношениях после этого.","criterion":"вы открыли-для-себя, каково это — провести разговор целиком: назвать нарушение, услышать последствия для другого и дать новое выполнимое слово, а не отделаться «извини».","time":"1 разговор"},{"cat":"integrity","title":"слово создает реальность","distinction":"ваше слово — не отчет о намерениях, а опора, на которой другой строит свою реальность. когда вы обещаете, человек уже перестраивает планы под ваше слово, еще до того как вы что-то сделали.","question":"под какое ваше слово прямо сейчас кто-то уже выстроил свой день или дело — и знаете ли вы вообще, на чем он стоит?","task":"спросите человека, который ждет от вас обещанного: «на что именно вы рассчитываете и к какому сроку?» — и понаблюдайте, насколько его картина совпадает с вашей.","criterion":"вы открыли-для-себя из его уст, что конкретно он построил на вашем слове, и обнаружили расхождение или подтвердили совпадение — догадки заменены фактом.","time":"1 разговор"},{"cat":"integrity","title":"слово себе","distinction":"Целостность начинается со слова, данного самому себе. невыполненные обещания себе роняют вашу работоспособность так же, как нарушенные обещания другим, — просто свидетелей нет, и потому их легче списать.","question":"какое слово себе вы нарушаете изо дня в день так привычно, что уже перестали считать это нарушением?","task":"дайте себе одно маленькое, заведомо выполнимое слово (например «лягу до 23:00») и поживите с ним один день — а если поймете, что не сдержите, переобещайте вслух до срока, а не задним числом. заметьте, что происходит с вами по ходу.","criterion":"вы заметили, что к концу дня слово либо сдержано, либо явно переобещано вами заранее — а не молча провалено и не забыто.","time":"1 день"},{"cat":"authentic","title":"парадокс аутентичности","distinction":"вы не становитесь аутентичным, перестав быть неаутентичным. вы становитесь аутентичным ровно в тот момент, когда честно называете, где именно вы сейчас неаутентичны.","question":"где сегодня вы притворяетесь тем, кем на самом деле не являетесь, — и боитесь это назвать?","task":"проживите один эксперимент: назовите вслух одному человеку одну свою маску прямо — «я делаю вид, что мне все понятно и все под контролем, а на самом деле нет», — и понаблюдайте, что меняется в самом моменте называния.","criterion":"вы заметили, что произнесли конкретную неаутентичность вслух другому и не смягчили ее оговоркой «но вообще-то»; открыли-для-себя, что в этот момент аутентичность не появилась откуда-то, а родилась из честного признания.","time":"1 разговор"},{"cat":"authentic","title":"цена маски","distinction":"каждый образ, который вы держите, питается вашей же энергией — ее ровно столько не доходит до дела. снятая маска не делает вас слабее, она возвращает силу, которую съедало притворство.","question":"какой образ вы удерживаете прямо сейчас — и сколько вас уходит на то, чтобы его не уронить?","task":"выберите ситуацию, где вы обычно «держите лицо», и войдите в нее без образа: скажите как есть, без отрепетированной версии себя, — и понаблюдайте, куда девается высвободившаяся сила.","criterion":"вы заметили, как в моменте поймали импульс надеть привычный образ и не надели; открыли-для-себя, что после разговора чувствуете не опустошение от игры, а высвобождение.","time":"1 день"},{"cat":"authentic","title":"слово и поступок","distinction":"аутентичность — не искренность чувств, а совпадение: быть и действовать в согласии с тем, кем вы себя заявляете. разрыв между «кем я объявил себя» и «что я реально делаю» — и есть мера неаутентичности.","question":"что вы громко заявляете о себе — и в каком поступке сегодня этому противоречите?","task":"возьмите одно свое заявление о себе («я честный», «я надежный», «мне важны люди») и сегодня проживите поступок, который приводит дело в соответствие с ним; заметьте, что меняется в вас, когда слово и дело сходятся.","criterion":"вы можете назвать конкретное наблюдаемое действие, которое раньше расходилось с вашим заявлением, а теперь совпало; открыли-для-себя разницу между намерением и совпавшим поступком.","time":"1 день"},{"cat":"authentic","title":"быть или казаться","distinction":"аутентичность — это когда тот, кем вы себя заявляете, и тот, кем вы проживаетесь, — один и тот же человек. казаться значит держать образ себя для других; быть значит позволить этому образу исчезнуть и остаться видимым таким, какой вы есть. разрыв между заявленным-собой и проживаемым-собой и есть место, где вы неаутентичны.","question":"где сегодня вы заняты тем, как выглядите в чужих глазах, — вместо того чтобы просто быть тем, кто вы есть?","task":"возьмите ситуацию, где вы обычно бережете образ себя, и войдите в нее без него: скажите или сделайте то, что верно для вас, даже если это рушит картинку, которую о вас держат, — и понаблюдайте, что открывается, когда образ снят.","criterion":"вы заметили конкретный момент, где выбрали быть собой вместо того, чтобы казаться кем-то; открыли-для-себя, что без охраны образа стали ближе к человеку напротив и к самому делу.","time":"1 разговор"},{"cat":"authentic","title":"снять броню","distinction":"броня образа защищает не вас, а представление о вас — и ровно ею вы отрезаны от других и от дела. выбрать дело вместо образа значит позволить себе быть видимым: ошибающимся, не знающим, нуждающимся.","question":"от чего вы защищаетесь броней прямо сейчас — и что станет возможным для дела, если вы ее опустите?","task":"проживите сегодня одно из двух вслух перед другим: признайте конкретную свою ошибку без оправданий ИЛИ попросите о помощи в том, в чем раньше делали вид, что справляетесь сами, — и заметьте, что происходит со связью, когда броня опущена.","criterion":"вы заметили, что прозвучало прямое «я ошибся, вот в чем» или «мне нужна помощь вот с этим» — без «но», без перекладывания и без шутки, обесценивающей признание; открыли-для-себя, что видимым быть не опаснее, а свободнее.","time":"1 разговор"},{"cat":"authentic","title":"выгода притворства","distinction":"маску вы носите не просто так — у каждого притворства есть тихая выгода: правота, безопасность, право не рисковать, сочувствие. пока вы не назовете эту выгоду, образ держит вас, а не вы его.","question":"что вы на самом деле выигрываете от того, что продолжаете казаться, а не быть, — и согласны ли честно за это платить делом?","task":"выберите одну привычную маску и запишите: «я притворяюсь … , потому что так получаю … , а делу это стоит … »; потом проживите эксперимент — скажите эту цену вслух тому, кого она касается, и понаблюдайте, как меняется власть образа над вами.","criterion":"у вас есть записанная связка маска—выгода—цена в конкретных словах, и вы озвучили ее человеку, которого это притворство затрагивало; вы заметили, что названная выгода перестала держать вас незаметно.","time":"15 минут"},{"cat":"bigger","title":"размер игры","distinction":"вы ровно того размера, какова игра, в которую вы играете. маленькая игра — маленький вы, как бы ни были вы талантливы внутри нее.","question":"в какую по размеру игру вы играете прямо сейчас — и не ужали ли вы ее до своего комфорта?","task":"запишите одну игру, которую сейчас ведете, и одним предложением расширьте ее ставку: «эта игра не про меня, она про ___». проживите, как меняется ваш масштаб, когда вы произносите эту ставку вслух тому, кого она тоже касается.","criterion":"вы открыли-для-себя ставку, которая больше вашей личной выгоды, и заметили, как при ней меняется ваше ощущение собственного размера в игре.","time":"20 минут"},{"cat":"bigger","title":"источник смелости","distinction":"смелость не берется из вас самих. она приходит, когда дело, которому вы служите, становится важнее того, чем вы рискуете. приверженность Чему-то Большему, Чем Ты Сам дает силу, которой нет у личной выгоды.","question":"есть ли у вас дело, ради которого вы готовы рискнуть выглядеть плохо?","task":"найдите разговор, который вы откладываете из страха, и проведите его сегодня — начните словами «я говорю это, потому что мне важно ___», назвав то большее, ради чего идете на риск. понаблюдайте, откуда берется сила сказать.","criterion":"вы заметили: страх был — но дело перевесило, и вы открыли-для-себя, что смелость пришла не из вас, а из того большего, чему вы служите.","time":"1 разговор"},{"cat":"bigger","title":"когда страх замолкает","distinction":"страх не управляет вами не потому, что вы его победили, а потому, что в этот момент дело важнее комфорта. страх остается — но перестает быть за рулем.","question":"чему вы позволяете решать за себя сегодня — страху или тому, что вам по-настоящему важно?","task":"выберите действие, которое не делаете из-за «неудобно/страшно», и сделайте его сегодня, держа в фокусе не себя, а того, для кого это важно. понаблюдайте, что происходит со страхом, когда не он за рулем.","criterion":"вы прожили действие при живом дискомфорте и открыли-для-себя, что страх может оставаться, но не быть тем, кто решает.","time":"1 день"},{"cat":"bigger","title":"цель без тебя","distinction":"пока игра про вашу выгоду, признание и безопасность — вы ее центр и ее потолок. когда служите тому, что больше вас, освобождается сила, которую выгода дать не может.","question":"если убрать из вашей цели все, что про вас, останется ли вообще цель?","task":"возьмите текущую задачу и перепишите ее цель так, чтобы в ней не было ни слова о вашей выгоде — только о тех, кому она служит. произнесите новую формулировку команде или близкому и заметьте, что меняется в вашей энергии.","criterion":"вы открыли-для-себя, что переписанная цель не содержит вашей личной выгоды и при этом все еще зажигает вас действовать.","time":"15 минут"},{"cat":"bigger","title":"приверженность против предпочтения","distinction":"предпочтение действует, пока удобно; приверженность держит, когда стало тяжело. Что-то Большее, Чем Ты Сам живет там, где вы остаетесь в деле после того, как пропало настроение.","question":"что из заявленного вами — настоящая приверженность, а что лишь предпочтение, пока легко?","task":"выберите обещание, от которого сегодня хочется тихо отступить, и выполните его именно сегодня — а тому, перед кем оно дано, скажите, что держите свое слово. понаблюдайте, на чем вы держитесь, когда настроения уже нет.","criterion":"вы прожили выполнение обещания в день, когда хотелось его обойти, и заметили разницу между приверженностью и предпочтением на себе.","time":"1 день"},{"cat":"bigger","title":"отдать авторство","distinction":"когда дело больше вас, вы перестаете держаться за то, чтобы быть его единственным героем. вы отдаете авторство и силу другим — потому что важна игра, а не ваше место в ней.","question":"за какую часть «это сделал я» вы держитесь так, что мельчает само дело?","task":"найдите вещь, которую держите на себе ради значимости, и сегодня передайте ее другому человеку вслух — отдав ему и решение, и признание. заметьте, что происходит с делом и с вами, когда вы отпускаете авторство.","criterion":"вы открыли-для-себя, каково это — когда конкретная зона ответственности и признание перешли к другому, и он это принял, а дело от этого стало больше.","time":"1 разговор"},{"cat":"cause","title":"я — источник","distinction":"Быть Причиной Происходящего — не правда о том, кто виноват, а ваша декларация: «я отношусь к этому так, будто все исходит из меня». вы не доказываете причинность — вы занимаете позицию, из которой появляется власть менять.","question":"в какой ситуации сегодня вы молча держитесь за версию «это случилось со мной», а не «это исходит из меня»?","task":"возьмите застрявшую ситуацию и вслух или письменно одному человеку переформулируйте ее фразой «я причина того, что…» — назвав свой вклад, без оправданий и без самобичевания. понаблюдайте, что при этом открывается.","criterion":"вы заметили, как со словами «я причина…» и названным конкретным вкладом (а не обстоятельствами) проявилась власть менять ситуацию.","time":"20 минут"},{"cat":"cause","title":"без виноватых","distinction":"поиск виноватого — себя или других — дает вам правоту и забирает власть. вина приковывает к прошлому; Быть Причиной Происходящего разворачивает к следующему действию. это разные позиции, а не разные факты.","question":"кого именно — себя или другого — вы прямо сейчас держите виноватым, и что эта правота дает вам взамен власти?","task":"поймайте себя на обвинении и замените его одним вопросом, сказанным себе или собеседнику: «что здесь зависит от меня и что я сделаю дальше?» — и проживите, что меняется в самом ощущении ситуации.","criterion":"вы открыли-для-себя, как в конкретном разговоре или мысли обвинение сменилось вопросом о следующем шаге, и этот шаг стал виден.","time":"1 разговор"},{"cat":"cause","title":"жертва или автор","distinction":"жертва обстоятельств и автор ситуации смотрят на одни и те же факты. разница не в фактах, а в том, кем вы себя в них объявляете — одно событие из двух разных бытий.","question":"где сегодня вы рассказываете историю «у меня не было выбора», хотя выбор был?","task":"выберите одну сегодняшнюю жалобу и перепишите ее предложением «я выбрал …, потому что для меня было важнее …» — назвав, что именно вы предпочли. заметьте, что происходит, когда жалоба становится выбором.","criterion":"вы прожили, как одна жалоба превратилась в «я выбрал, потому что важнее было…», и за ней проступил ваш реальный приоритет.","time":"15 минут"},{"cat":"cause","title":"линия ответственности","distinction":"ответственность вы не находите — вы ее проводите, как линию, и заявляете: «отсюда и дальше — мое». там, где вы раньше останавливались на «это не моя зона», и спрятан невидимый рычаг.","question":"где проходит граница, за которой вы говорите «это уже не мое», и что изменится, если передвинуть ее на шаг дальше?","task":"найдите дело, которое считаете «не своим», и возьмите из него один конкретный кусок на себя — скажите об этом вслух тому, кого это касается: «эту часть беру я». понаблюдайте, что открывается, когда линия сдвигается.","criterion":"вы заметили появление рычага в тот момент, когда вслух заявили человеку конкретную часть прежде «чужого» дела, и эта часть была названа.","time":"1 разговор"},{"cat":"cause","title":"первый ход","distinction":"пока вы причина проблемы только на словах, рычаг не появляется. он открывается, когда вы перестаете ждать, что первым изменится другой, и делаете ход сами — раньше его буквально не было видно.","question":"какое действие стало бы для вас очевидным, если бы вы перестали ждать, что первым изменится кто-то другой?","task":"возьмите проблему, где вы ждете хода от другого, и сделайте сегодня свой ход первым — отправьте сообщение, задайте вопрос или начните разговор, не дожидаясь их движения. заметьте, что меняется, как только ход сделан.","criterion":"вы открыли-для-себя, как действие, направленное наружу (отправлено/сказано) сегодня, а не оставшееся намерением, сдвинуло саму ситуацию.","time":"1 день"},{"cat":"cause","title":"признать без оправданий","distinction":"признать свой вклад — не то же, что оправдываться или каяться. оправдание защищает вашу правоту, покаяние топит в вине. чистое признание просто называет, что сделали вы, и оставляет вас свободным действовать.","question":"за каким объяснением «почему так вышло» вы прячете простое признание «я это сделал»?","task":"выберите ситуацию, где вы дали маху, и скажите прямо тому, кого это коснулось: «я это сделал» — без «но», без причин, без «зато». потом предложите, что сделаете дальше. проживите, какая свобода появляется после чистого признания.","criterion":"вы прожили, как после признания без единого «но» и «потому что» — и с названным следующим действием — открылась свобода действовать.","time":"1 разговор"},{"cat":"oncourt","title":"сойди с трибуны","distinction":"с трибуны видно, как должно быть; На-поле вы играете тем, что есть. ваше точное «как надо» не двигает игру ни на сантиметр, пока вы сами не входите в нее.","question":"где сегодня вы объясняете, как должно быть, вместо того чтобы войти и сыграть?","task":"возьмите ситуацию, в которой вы комментируете со стороны, и проживите одно действие изнутри нее — позвоните, скажите, начните — без предварительного объяснения, почему так правильно. понаблюдайте, что меняется, когда вы внутри.","criterion":"вы заметили, что к концу дня в этой ситуации появилось ваше совершенное действие, а не более точная формулировка того, что должны сделать другие.","time":"1 действие"},{"cat":"oncourt","title":"объяснение — это трибуна","distinction":"объяснение, почему не получилось, всегда звучит с трибуны и звучит разумно. но разумность объяснения не меняет того, что игра не сыграна.","question":"какое ваше убедительное объяснение прямо сейчас держит вас вне игры?","task":"поймайте одно свое объяснение «почему пока нельзя/не вышло» и вместо того, чтобы его доказывать, сделайте первый реальный шаг туда, куда оно вас не пускает. откройте-для-себя, что там на самом деле.","criterion":"вы можете назвать конкретный шаг, сделанный сегодня вопреки объяснению, и заметили разницу между ним и более полной версией самого объяснения.","time":"30 минут"},{"cat":"oncourt","title":"лидерство в моменте","distinction":"лидерство не случается в плане до и в разборе после — только в самом моменте действия. между «собирался» и «разобрал» есть узкая полоса, где вы либо лидер, либо зритель.","question":"в какой момент сегодня вы были На-поле — и не упустили ли вы его в подготовку и анализ?","task":"выберите разговор, где вы обычно готовитесь заранее или потом прокручиваете, и в самом разговоре скажите вслух то, что обычно оставляете на «до» или «после». заметьте, что происходит в моменте.","criterion":"вы прожили, как слова, которые вы держали в плане или в послемыслии, прозвучали вживую, в моменте, в присутствии другого человека.","time":"1 разговор"},{"cat":"oncourt","title":"заверши действием","distinction":"различение становится вашим не когда вы его поняли, а когда вы из него действуете. понятое, но не прожитое в действии, остается фразой с трибуны.","question":"какое различение вы уже «понимаете», но еще ни разу не довели до действия?","task":"возьмите различение из курса, которое вам «ясно», и проживите сегодня одно конкретное действие, которое возможно только из него. понаблюдайте, как оно меняет само действие.","criterion":"вы видите действие, про которое честно открывается: без этого различения вы бы его не сделали, — а не пересказ того, что оно значит.","time":"1 действие"},{"cat":"oncourt","title":"счет, а не комментарий","distinction":"комментатор оценивает игру; игрок отвечает за счет. На-поле важно не то, насколько точно вы видите, что не так, а то, что вы делаете со счетом отсюда.","question":"за какой результат сегодня вы взяли ответственность игрока, а где остались оценивающим комментатором?","task":"в деле, которое идет не так, перестаньте описывать, что не так, и назовите вслух результат, за который вы лично отвечаете, — и сделайте ближайший ход к нему. заметьте, как смещается ваше место в игре.","criterion":"вы прожили, как заявили конкретный результат как свой и сделали к нему один ход, не выдав ни одного «но проблема в том, что…».","time":"30 минут"},{"cat":"oncourt","title":"из игры, не про игру","distinction":"говорить про игру — это с трибуны: «мы», «они», «надо бы». говорить из игры — изнутри, от первого лица, в настоящем: «я делаю», «я прошу», «я обещаю».","question":"сколько раз сегодня вы говорили про ситуацию вместо того, чтобы говорить из нее?","task":"в одном разговоре замените отстраненные формы («надо бы», «кто-то должен», «хорошо бы») на прямую речь из игры: «я сделаю это к…», «я прошу вас…» — и произнесите это собеседнику. понаблюдайте, как меняется разговор.","criterion":"вы заметили, что собеседник услышал от вас минимум одно обещание или прямую просьбу от первого лица со сроком, а не рассуждение о том, как должно быть.","time":"1 разговор"},{"cat":"context","title":"уже-всегда слушание","distinction":"еще до первого слова человека вы уже его как-то слышите — сквозь готовый фон оценок, историй и ожиданий. это уже-всегда слушание было там до разговора и решает, что вы вообще способны услышать.","question":"сквозь какой готовый ярлык вы слушаете этого человека еще до того, как он открыл рот?","task":"перед разговором с конкретным человеком назовите про себя одной фразой, кем вы его уже держите («ленивый», «спорщик», «свой»), и понаблюдайте, как этот ярлык фильтрует то, что вы услышите.","criterion":"вы заметили ярлык, который был до разговора, и поймали хотя бы один момент, где услышали не то, что ждали — а что-то живое.","time":"1 разговор"},{"cat":"context","title":"контекст не факт","distinction":"факт — что произошло; контекст — внутри чего это для вас живет. одно событие в контексте «меня подставили» и в контексте «мне дали материал для роста» рождает разные действия. факт не меняется, контекст вы выбираете.","question":"какой факт сегодня вы перепутали с историей, которую сами же на него надели?","task":"возьмите одну сегодняшнюю неприятность, выпишите в одну строку голый факт без оценок, а во вторую — историю, которую вы к нему добавили, и понаблюдайте, как они держатся раздельно.","criterion":"вы видите на бумаге две разные строки — чистый факт и вашу интерпретацию — и открыли-для-себя, что вторую можно заменить, а первую нет.","time":"15 минут"},{"cat":"context","title":"создай контекст вслух","distinction":"контекст, который не задан, задается сам — обычно из тревоги и прошлого. лидер не оставляет его на самотек: он называет вслух, ради чего эта встреча, и внутри этого тон людей меняется еще до содержания.","question":"какой контекст вы создадите для людей сегодня вместо того, что соберется по умолчанию?","task":"в начале одной встречи или звонка скажите вслух одну фразу о том, ради чего вы здесь и каким будет этот разговор, прежде чем перейти к делу, и заметьте, что произойдет с тоном.","criterion":"вы произнесли установочную фразу до повестки и заметили сдвиг в тоне — люди ответили иначе, чем на обычное «ну что, начнем».","time":"1 разговор"},{"cat":"context","title":"контекст, не действия","distinction":"когда дергаете людей за действия, получаете сопротивление и контроль. когда создаете контекст, внутри которого нужное действие естественно, люди делают его сами. лидер работает на уровне контекста, а не приказа.","question":"где сегодня вы пытаетесь продавить действие там, где надо было создать контекст?","task":"выберите задачу, которую хотите от человека, и вместо инструкции «сделай так» дайте ему контекст: ради чего это важно и что станет возможным — а как, оставьте ему; понаблюдайте, что он предложит.","criterion":"вы передали смысл и рамку без пошаговой команды и заметили, что человек сам предложил способ сделать, а не ждал указаний.","time":"1 разговор"},{"cat":"context","title":"контекст решает возможное","distinction":"не способности и не обстоятельства определяют, что возможно, а контекст, из которого вы на них смотрите. «это нереально» и «как именно это сделать» — не про разные задачи, а про разные контексты вокруг одной.","question":"что стало бы возможным сегодня, если бы вы сменили контекст с «это не выйдет» на «это уже делается, вопрос как»?","task":"возьмите дело, которое мысленно держите как «невозможно», переформулируйте его в письменный вопрос «что нужно, чтобы это случилось?» и выпишите три первых шага — заметьте, как сдвигается само поле возможного.","criterion":"вы открыли-для-себя три конкретных шага к тому, что час назад казалось закрытым, и сделали хотя бы первый.","time":"15 минут"},{"cat":"context","title":"смени свой фон","distinction":"вы не только создаете контекст для других — вы сами живете внутри своего и обычно его не видите, как рыба не видит воду. пока фон, из которого вы слушаете, скрыт, он управляет вами. названный — становится выбором.","question":"из какого скрытого фона вы весь сегодняшний день слушаете мир и себя?","task":"вечером назовите одним словом фон, в котором прошел ваш день («надо успеть», «меня недооценивают», «все под контролем»), и понаблюдайте, вы его выбрали или он вас.","criterion":"вы назвали фон дня одним словом и заметили хотя бы один поступок, который этот фон продиктовал, а вы не увидели в моменте.","time":"15 минут"},{"cat":"talk","title":"слово создает реальность","distinction":"в Разговорном Домене дела движутся речью: то, что вы говорите, не описывает мир — оно его строит. «у нас проблема» и «у нас есть задача» — два разных речевых акта, рождающих два разных будущих и двух разных вас в них.","question":"какую реальность вы сейчас творите своими словами о людях и о деле?","task":"поймайте одну привычную жалобу, которую сегодня произнесете, и проживите, как звучит та же ситуация, сказанная как факт плюс желаемый результат — при том же человеке.","criterion":"вы услышали из своих уст обе версии — старую и новую — и заметили, что в комнате возникло разное будущее и собеседник отозвался на вторую иначе.","time":"1 разговор"},{"cat":"talk","title":"проси, а не намекай","distinction":"в Разговорном Домене дело сдвигает речевой акт просьбы. надежда, что догадаются, — это не действие, а ожидание: дело движет только четкая просьба — кому, что именно и к какому сроку.","question":"где вы ждете результата, но так и не произнесли прямую просьбу?","task":"возьмите одно зависшее дело и проживите речевой акт просьбы: обратитесь к конкретному человеку с «что» и «к какому сроку».","criterion":"вы заметили разницу между намеком и произнесенной просьбой: прозвучал явный срок, и человек ответил «да», «нет» или «давай иначе» — а не молчанием.","time":"15 минут"},{"cat":"talk","title":"обещание держит будущее","distinction":"обещание — это речевой акт, которым вы сами становитесь Причиной Происходящего в будущем. размытое «постараюсь» не держит ничего; названный срок делает вас причиной.","question":"что вы называете обещанием там, где на деле лишь намерение?","task":"дайте сегодня одно ясное обещание со сроком и понаблюдайте, как меняется ваше отношение к делу; тут же назовите, кого предупредите первым, если поймете, что не успеваете.","criterion":"вы открыли-для-себя, что обещание со сроком держит будущее иначе, чем намерение: оно дано вслух или письменно с конкретной датой, и назван тот, кому вы сообщите о сбое заранее.","time":"15 минут"},{"cat":"talk","title":"заверши разговор","distinction":"в Разговорном Домене незавершенный разговор не исчезает — он тихо тянет работоспособность из настоящего. завершение — речевой акт не про то, кто прав, а про то, чтобы освободить силу.","question":"какой разговор вы откладываете, и сколько он уже забирает у вас каждый день?","task":"инициируйте тот один разговор, что висит дольше всего: скажите или напишите человеку «мне важно закрыть это с вами, когда сможем поговорить?» — и понаблюдайте, что освободится.","criterion":"вы прожили завершение как речевой акт: разговор состоялся или назначен на конкретное время, и вы заметили, что тема перестала фоном крутиться в голове.","time":"1 разговор"},{"cat":"talk","title":"декларация задает игру","distinction":"декларация — речевой акт, которым вы не описываете положение дел, а объявляете новое: «с этого дня мы так не делаем». лидер творит контекст словом, а не ждет, пока обстоятельства разрешат.","question":"какую игру вы готовы объявить вслух — вместо того чтобы ждать подходящих условий?","task":"произнесите сегодня одну декларацию перед теми, кого она касается: коротко назовите, что отныне будет иначе и с какого момента — и заметьте, что меняется в самом разговоре.","criterion":"вы открыли-для-себя силу декларации как речевого акта: она сказана прямо людям, названа точка отсчета, и хотя бы один человек ее услышал и подтвердил.","time":"1 разговор"},{"cat":"talk","title":"слушай как лидер","distinction":"в Разговорном Домене слушание — тоже речевой акт. вы слышите не слова, а свое уже-всегда слушание поверх них. слушать На-поле — значит уловить, о чем человек просит на самом деле, прежде чем возражать.","question":"в каком разговоре вы слушали, чтобы ответить, а не чтобы услышать просьбу под словами?","task":"в одном разговоре, прежде чем ответить, верните собеседнику его суть: «правильно ли я понял, что вы просите…» — и понаблюдайте, что открывается, когда вы дожидаетесь подтверждения.","criterion":"вы заметили свое уже-всегда слушание и прожили слушание иначе: переформулировали просьбу собеседника своими словами, и он сказал «да, именно» или поправил вас — до того, как вы дали свой ответ.","time":"1 разговор"},{"cat":"discover","title":"не поверь — заметь","distinction":"понятие курса не работает, пока вы в него верите на словах. оно начинает действовать в тот миг, когда вы находите его живьем в собственном опыте, как это проживается.","question":"какое понятие курса вы сейчас знаете наизусть, но ни разу не видели в своей жизни?","task":"возьмите один концепт с занятия и понаблюдайте за прошедшей неделей: где он реально проявился? откройте-для-себя конкретный эпизод и запишите дату, место и что именно вы делали.","criterion":"вы заметили один реальный случай с деталями — прожитый, а не пересказ определения из материала.","time":"15 минут"},{"cat":"discover","title":"слепое пятно","distinction":"слепое пятно — это то, что вы не видите и не видите, что не видите. сами вы до него не дотянетесь: его видно только с чужого ракурса.","question":"что вы делаете постоянно, чего сами в упор не замечаете?","task":"спросите человека, который часто вас наблюдает: «что я делаю, чего сам не замечаю и что мешает другим?» — и молча выслушайте до конца, понаблюдав за тем, что в вас поднимется.","criterion":"вы услышали минимум одну вещь, которая вас удивила или задела, и заметили в себе порыв оправдаться — но не пошли за ним.","time":"1 разговор"},{"cat":"discover","title":"сила вопроса","distinction":"сила лидера не в готовых ответах, а в качестве вопросов, которые он задает. слабый вопрос закрывает тему, сильный — открывает то, чего раньше не было видно.","question":"какой вопрос вы обычно не задаете, потому что боитесь ответа?","task":"в одном разговоре замените свой обычный совет на открытый вопрос, дайте собеседнику договорить, не подсказывая, и понаблюдайте, куда пойдет разговор.","criterion":"вы открыли-для-себя, что разговор пошел туда, куда вы не планировали, и собеседник сказал больше, чем вы ожидали.","time":"1 разговор"},{"cat":"discover","title":"прожито, а не понято","distinction":"понять идею головой и прожить ее телом — два разных события. различение становится вашим только когда вы опознаете его изнутри ситуации, как это проживается, а не вспоминаете после.","question":"что из курса вы понимаете умом, но ни разу не прожили в моменте?","task":"выберите одно различение и сегодня поймайте момент, когда оно случается прямо сейчас — назовите его про себя в ту же секунду, не задним числом, и заметьте, что при этом происходит.","criterion":"вы поймали различение в реальном времени, по ходу события, и можете описать, что прожили тогда.","time":"1 день"},{"cat":"discover","title":"контрпример себе","distinction":"когда вы уверены, что понятие про вас верно «всегда» — вы перестали смотреть. живой опыт проверяется не подтверждением, а попыткой найти случай, где было иначе.","question":"где вы обманываете себя, считая, что у вас этого нет?","task":"возьмите утверждение о себе, в котором вы уверены, и честно поищите в этой неделе один случай, который ему противоречит — откройте-для-себя и запишите его.","criterion":"вы нашли и записали конкретный контрпример — а не доказали себе, что были правы.","time":"15 минут"},{"cat":"discover","title":"зеркало обратной связи","distinction":"то, как вы выглядите со стороны, и то, каким вы себя ощущаете, почти никогда не совпадают. этот разрыв — и есть место, где живет открытие про себя.","question":"каким вас видят в деле, и насколько это расходится с тем, кем вы себя считаете?","task":"попросите двух разных людей описать тремя словами, каким вы бываете в работе, сравните их слова с тремя своими и понаблюдайте, что в вас откликнется на расхождение.","criterion":"вы держите чужие слова рядом со своими и открыли-для-себя конкретное расхождение, а не общее совпадение.","time":"2 разговора"}];

  function hexA(hex,a){ var h=hex.replace("#",""); return "rgba("+parseInt(h.substr(0,2),16)+","+parseInt(h.substr(2,2),16)+","+parseInt(h.substr(4,2),16)+","+a+")"; }
  function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

  function pool(){ if(filter==="fav"){ var f={}; for(var i=0;i<favs.length;i++)f[favs[i]]=1; return CARDS.filter(function(c){return f[c.id];}); }
    if(filter) return CARDS.filter(function(c){return c.cat===filter;}); return CARDS.slice(); }
  function emptyMsg(){ return filter==="fav"?"Пока нет избранных карт — отметьте ♥ на любой карте":"В этой области нет карт"; }

  // ---- selection ----
  function cardOfDay(){ var d=new Date(); var seed=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate(); return CARDS[seed%CARDS.length]; }
  function drawOne(){ var p=pool(); if(!p.length)return[]; if(p.length===1)return[p[0]]; var pick,g=0;
    do{ pick=p[Math.floor(Math.random()*p.length)]; g++; }while(pick.id===lastDrawn&&g<25); lastDrawn=pick.id; save(KEY.last,lastDrawn); return[pick]; }
  function drawSpread(){ var p=pool(),out=[],used={}; while(out.length<Math.min(3,p.length)){ var i=Math.floor(Math.random()*p.length); if(!used[i]){used[i]=1;out.push(p[i]);} } return out; }

  function iconBtn(glyph,cls){ var b=el("button","icobtn"+(cls?" "+cls:""),'<span aria-hidden="true">'+glyph+'</span>'); return b; }
  function buildContent(node,card,side){
    var cat=CATS[card.cat];

    badge.innerHTML='<span class="dot" style="background:'+cat.color+';box-shadow:0 0 7px '+hexA(cat.color,.7)+'"></span>'+esc(side==="back"?"Полевой эксперимент":cat.name);
    var tools=el("div","tools");
    var on=favs.indexOf(card.id)>=0;
    var fav=iconBtn(on?"♥":"♡",on?"on":""); fav.setAttribute("data-fav",card.id); fav.setAttribute("aria-pressed",on?"true":"false"); fav.setAttribute("aria-label",on?"Убрать из избранного":"Добавить в избранное");
    var copy=iconBtn("⧉"); copy.setAttribute("data-copy","1"); copy.setAttribute("aria-label","Копировать карту");
    tools.appendChild(fav); tools.appendChild(copy);
    tools.appendChild(el("span","num",esc(side==="back"?("⏱ "+card.time):cardNo(card))));
    head.appendChild(badge); head.appendChild(tools); node.appendChild(head);

    if(side!=="back"){
      var holo=FOIL[card.cat];
      var med=el("div","glyph",cat.glyph);
      med.style.background="radial-gradient(circle at 35% 28%, "+hexA(holo[0],.6)+", "+hexA(holo[1],.2)+" 68%, transparent)";
      med.style.border="1px solid "+hexA(holo[1],.55);
      med.style.boxShadow="inset 0 1px 7px "+hexA(holo[2],.4);
      node.appendChild(med);
      node.appendChild(el("div","c-title",esc(card.title)));
      var dv=el("div","divider"); dv.style.background="linear-gradient(90deg, transparent, "+hexA(FOIL[card.cat][1],.75)+", transparent)"; node.appendChild(dv);
    }
    function block(lab,txt,opt){
      node.appendChild(el("div","label",esc(lab)));
      if(opt&&opt.crit){ node.appendChild(el("p","text crit",'<span class="ok" aria-hidden="true">✓</span><span>'+esc(txt)+'</span>')); }
      else node.appendChild(el("p","text"+(opt&&opt.q?" q":""),esc(txt)));
    }
    if(side==="front"){ block("Различение",card.distinction); block("Вопрос дня",card.question,{q:true}); }
    else { block("Задание",card.task); block("Критерий «сделано»",card.criterion,{crit:true}); }

    var foot=el("div","foot");
    var rank=side==="back"?"оборот · практика":"лицо · созерцание";
    foot.innerHTML='<span class="src">'+esc(card.source)+'</span><span>'+rank+'</span>';
    node.appendChild(foot);

  function faceNode(card,side){
    var holo=FOIL[card.cat];
    var face=el("div","face "+side);
    face.style.background="linear-gradient(135deg, "+holo[0]+", "+holo[1]+", "+holo[2]+", "+holo[0]+")";
    var inner=el("div","inner");
    var tint=el("div","holo");
    tint.style.background="linear-gradient(125deg, "+hexA(holo[0],.55)+" 0%, transparent 32%, "+hexA(holo[1],.42)+" 52%, transparent 72%, "+hexA(holo[2],.55)+" 100%)";
    tint.style.backgroundSize="200% 200%";
    var content=el("div","content"); buildContent(content,card,side);
    var sheen=el("div","sheen");
    inner.appendChild(tint); inner.appendChild(content); inner.appendChild(sheen);
    face.appendChild(inner);
    return face;
  }
  function cardScene(card,small){
    var scene=el("div","scene"+(small?" small":""));

    cardEl.setAttribute("role","button"); cardEl.setAttribute("tabindex","0"); cardEl.setAttribute("aria-pressed","false");
    cardEl.setAttribute("aria-label","Карта «"+card.title+"». Нажмите, чтобы перевернуть");
    cardEl.appendChild(faceNode(card,"front"));
    cardEl.appendChild(faceNode(card,"back"));
    function flip(){ var f=cardEl.classList.toggle("flip"); cardEl.setAttribute("aria-pressed",f?"true":"false");
      cardEl.setAttribute("aria-label","Карта «"+card.title+"»: "+(f?"оборот":"лицо")+". Нажмите, чтобы перевернуть"); }
    cardEl.addEventListener("click",flip);
    cardEl.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); flip(); } });
    scene.appendChild(cardEl);
    var fbtns=scene.querySelectorAll("[data-fav]"); for(var i=0;i<fbtns.length;i++)(function(b){ b.addEventListener("click",function(e){ e.stopPropagation(); toggleFav(card); }); })(fbtns[i]);
    var cbtns=scene.querySelectorAll("[data-copy]"); for(var j=0;j<cbtns.length;j++)(function(b){ b.addEventListener("click",function(e){ e.stopPropagation(); copyCard(card,cardEl); }); })(cbtns[j]);
    return scene;
  }

  // ---- fav / copy ----
  function toggleFav(card){
    var i=favs.indexOf(card.id); if(i>=0)favs.splice(i,1); else favs.push(card.id); save(KEY.fav,favs);

    for(var k=0;k<bs.length;k++){ var on=favs.indexOf(card.id)>=0; bs[k].className="icobtn"+(on?" on":""); bs[k].setAttribute("aria-pressed",on?"true":"false"); bs[k].setAttribute("aria-label",on?"Убрать из избранного":"Добавить в избранное"); bs[k].firstChild.textContent=on?"♥":"♡"; }
    buildCats(); if(filter==="fav"){ view==="path"?renderPath():act(lastAction,true); }

  function copyCard(card,cardEl){

    if(back) text=card.title+"\n\nЗадание: "+card.task+"\nКритерий: "+card.criterion+"\nВремя: "+card.time+"\nИсточник: "+card.source;
    else text=card.title+" · "+CATS[card.cat].name+"\n\n"+card.distinction+"\n\nВопрос дня: "+card.question+"\nИсточник: "+card.source;
    text+="\n\n— Бытие Лидерства · Карты";
    var ok=function(){ toast("Скопировано ✓"); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(ok,function(){ fbCopy(text,ok); }); } else fbCopy(text,ok);
  }
  function fbCopy(text,cb){ try{ var ta=el("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); ta.remove(); cb&&cb(); }catch(e){} }
  var toastT=null;
  function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove("show"); },1500); }

  // ---- journal ----
  function addHistory(cards,a){ if(!cards.length||!cards[0])return; var ids=cards.map(function(c){return c.id;}); var last=hist[0];
    if(last&&last.action===a&&JSON.stringify(last.ids)===JSON.stringify(ids))return;
    hist.unshift({ids:ids,action:a,ts:Date.now()}); hist=hist.slice(0,30); save(KEY.hist,hist); }
  function relTime(ts){ var d=new Date(ts),now=new Date();
    function same(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
    var hm=("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
    if(same(d,now))return "сегодня "+hm; var y=new Date(now); y.setDate(now.getDate()-1);
    if(same(d,y))return "вчера "+hm; return d.getDate()+"."+("0"+(d.getMonth()+1)).slice(-2); }
  function openJournal(){
    if(document.querySelector("[data-ov]"))return;
    var ov=el("div","overlay"); ov.setAttribute("data-ov","1");
    var sheet=el("div","sheet"); sheet.setAttribute("role","dialog"); sheet.setAttribute("aria-modal","true"); sheet.setAttribute("aria-label","Журнал");
    var head=el("div","sheet-head"); head.innerHTML='<strong style="font:600 16px/1 var(--serif);color:var(--txt)">Журнал</strong>';
    var hr=el("div"); hr.style.cssText="display:flex;gap:8px;align-items:center";
    var clr=el("button","btn","Очистить"); if(!hist.length){clr.disabled=true;}
    var cl=iconBtn("✕"); cl.style.color="var(--mut)"; cl.setAttribute("aria-label","Закрыть");
    hr.appendChild(clr); hr.appendChild(cl); head.appendChild(hr);
    var body=el("div","sheet-body");
    if(!hist.length) body.appendChild(el("div","empty","Журнал пуст"));
    else for(var i=0;i<hist.length;i++)(function(h){
      var cards=h.ids.map(function(id){return CARDS.filter(function(c){return c.id===id;})[0];}).filter(Boolean); var main=cards[0]; if(!main)return;
      var extra=cards.length>1?" +"+(cards.length-1):"";
      var row=el("button","jrow");
      row.innerHTML='<span class="jg">'+CATS[main.cat].glyph+'</span><span class="jt">'+esc(main.title)+extra+'</span><span class="jm">'+(ACTION_LABEL[h.action]||esc(h.action))+' · '+relTime(h.ts)+'</span>';
      row.addEventListener("click",function(){ ov.remove(); view="cards"; current={cards:cards,roles:cards.length===3?ROLES:null}; renderActions(); renderCards(current.cards,current.roles); });
      body.appendChild(row);
    })(hist[i]);
    sheet.appendChild(head); sheet.appendChild(body); ov.appendChild(sheet); document.getElementById("app").appendChild(ov);
    function close(){ ov.remove(); }
    ov.addEventListener("click",function(e){ if(e.target===ov)close(); });
    cl.addEventListener("click",close); clr.addEventListener("click",function(){ hist=[]; save(KEY.hist,hist); close(); });
  }

  // ---- help ----
  function openHelp(){
    if(document.querySelector("[data-ov]"))return; save(KEY.intro,1);
    var ov=el("div","overlay"); ov.setAttribute("data-ov","1");
    var sheet=el("div","sheet"); sheet.setAttribute("role","dialog"); sheet.setAttribute("aria-modal","true"); sheet.setAttribute("aria-label","Как пользоваться картами");
    var head=el("div","sheet-head");
    head.innerHTML='<div><div style="font:600 9.5px/1 var(--sans);letter-spacing:.28em;text-transform:uppercase;color:var(--mut);margin-bottom:6px">бытие лидерства</div><strong style="font:500 19px/1 var(--serif);color:var(--txt)">Как пользоваться картами</strong></div>';
    var cl=iconBtn("✕"); cl.style.color="var(--mut)"; cl.setAttribute("aria-label","Закрыть"); head.appendChild(cl);
    var body=el("div","sheet-body");
    var h="";
    h+='<p class="hP" style="margin-top:16px">Это колода различений подхода «Бытие Лидерства». Каждая карта — одно различение лидера: сначала вы <b style="color:var(--txt)">открываете-для-себя</b> его, потом <b style="color:var(--txt)">проживаете</b> в действии. Это не набор техник, а сдвиг бытия, из которого действие следует само.</p>';
    h+='<div class="hH">анатомия карты</div><div class="hT">Одна карта — две стороны</div>';
    h+='<div style="display:flex;flex-direction:column;gap:8px">'
      +'<div class="hcard"><b>ЛИЦО</b><span class="hP" style="margin:0">Различение и вопрос дня. Прочитайте и побудьте с вопросом — это про бытие: кем вы есть в этом различении.</span></div>'
      +'<div class="hcard"><b>ОБОРОТ</b><span class="hP" style="margin:0">Полевой эксперимент и критерий. Нажмите на карту, чтобы перевернуть — это про действие, которое естественно следует из различения, а не «домашка».</span></div></div>';
    h+='<div class="hH">две группы · 8 областей</div><div class="hT">Фундамент и Доступ</div>';
    h+='<p class="hP">Первые четыре области — <b style="color:var(--txt)">Фундамент</b>: кто вы как лидер (четыре фактора). Остальные четыре — <b style="color:var(--txt)">Доступ</b>: как лидерство проявляется в контексте, на-поле, в разговоре и в опыте.</p>';
    h+='<div style="display:flex;flex-direction:column;gap:10px;margin-top:8px">';
    ["Фундамент","Доступ"].forEach(function(tier){
      h+='<div><div style="font:600 9px/1 var(--sans);letter-spacing:.22em;text-transform:uppercase;color:var(--mut);margin-bottom:6px">'+tier+'</div><div style="display:flex;flex-wrap:wrap;gap:8px">'
        +Object.keys(CATS).filter(function(id){return CATS[id].tier===tier;}).map(function(id){return '<span style="display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border:1px solid var(--line);border-radius:999px;font:500 12.5px/1 var(--sans);color:var(--txt)"><span style="width:8px;height:8px;border-radius:50%;background:'+CATS[id].color+'"></span>'+esc(CATS[id].name)+'</span>';}).join("")
        +'</div></div>';
    });
    h+='</div>';
    h+='<div class="hH">способы работы</div><div class="hT">Пять способов вытянуть</div>';
    var ways=[["Карта дня","одна на сегодня, общая для всех — меняется раз в день."],["Вытянуть карту","случайная из выбранной области, когда нужен импульс."],["Расклад «Ход»","три карты: Ситуация · Слепое пятно · Следующий ход."],["Путь по колоде","пройти всю колоду по порядку, область за областью."],["Журнал","история вытянутых карт — вернуться к любой."]];
    h+='<div style="display:flex;flex-direction:column">'+ways.map(function(w){return '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)"><b style="color:var(--txt);font:600 13.5px/1.4 var(--sans);flex:0 0 38%">'+w[0]+'</b><span class="hP" style="margin:0">'+w[1]+'</span></div>';}).join("")+'</div>';
    h+='<div class="hH">ритуал</div><div class="hT">Как с этим жить</div>';
    var steps=["Прочитайте лицо и побудьте с вопросом дня.","Переверните карту — получите полевой эксперимент.","Проживите его сегодня: в реальном разговоре или деле.","Сверьтесь с критерием — что вы заметили и открыли-для-себя.","Отметьте ♥ то, к чему хотите вернуться, и приходите завтра."];
    h+='<div style="display:flex;flex-direction:column;gap:11px">'+steps.map(function(s,i){return '<div style="display:flex;gap:12px;align-items:flex-start"><span style="flex:0 0 auto;width:25px;height:25px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font:600 12px/23px var(--sans);text-align:center">'+(i+1)+'</span><span class="hP" style="margin:0;padding-top:2px">'+s+'</span></div>';}).join("")+'</div>';
    body.innerHTML=h;
    var foot=el("div","sheet-foot");
    var cta=el("button","btn primary","Понятно — начать"); cta.style.width="100%"; foot.appendChild(cta);
    sheet.appendChild(head); sheet.appendChild(body); sheet.appendChild(foot); ov.appendChild(sheet); document.getElementById("app").appendChild(ov);
    function close(){ ov.remove(); }
    ov.addEventListener("click",function(e){ if(e.target===ov)close(); });
    cl.addEventListener("click",close); cta.addEventListener("click",close);
  }

  // ---- render ----
  var stage;
  function flipHint(){ return el("div","flip-hint",'<span style="font-size:13px">↻</span> нажмите, чтобы перевернуть'); }
  function renderCards(cards,roles){
    stage.innerHTML="";
    if(!cards||!cards.length||!cards[0]){ stage.appendChild(el("div","empty",emptyMsg())); return; }
    for(var i=0;i<cards.length;i++){ var col=el("div","col");
      if(roles) col.appendChild(el("div","role",esc(roles[i])));
      col.appendChild(cardScene(cards[i],!!roles)); col.appendChild(flipHint());
      stage.appendChild(col); }
  }
  function act(a,silent){ view="cards"; lastAction=a; var cards=[],roles=null;
    if(a==="day"){ var c=cardOfDay(); cards=[c]; dayMark={date:todayLocal(),id:c.id}; save(KEY.day,dayMark); }
    else if(a==="draw") cards=drawOne();
    else if(a==="spread"){ cards=drawSpread(); roles=ROLES; }
    current={cards:cards,roles:roles}; if(!silent) addHistory(cards,a); renderActions(); renderCards(cards,roles); }

  // ---- path ----
  function pathScope(){ return filter===null?"all":filter; }
  function pathGet(){ return pathState[pathScope()]||0; }
  function pathSet(i){ pathState[pathScope()]=i; save(KEY.path,pathState); }
  function showPath(){ view="path"; renderActions(); renderPath(); }
  function pathStep(d){ if(view!=="path")return; var p=pool(); if(!p.length)return; var pos=Math.max(0,Math.min(pathGet()+d,p.length-1)); pathSet(pos); renderPath(); }
  function renderPath(){
    stage.innerHTML=""; var p=pool();
    if(!p.length){ stage.appendChild(el("div","empty",emptyMsg())); return; }
    var pos=Math.max(0,Math.min(pathGet(),p.length-1)); pathSet(pos);
    var card=p[pos], cat=CATS[card.cat];
    var catCards=p.filter(function(c){return c.cat===card.cat;}), idxInCat=catCards.indexOf(card)+1;
    var ctx=el("div","pathctx");
    ctx.innerHTML='<div class="k">путь по колоде · по порядку</div><div class="v"><span style="display:inline-flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:'+cat.color+';box-shadow:0 0 8px '+hexA(cat.color,.7)+'"></span>'+esc(cat.name)+' · '+idxInCat+' / '+catCards.length+'</span><span style="color:var(--mut);font-weight:400">карта '+(pos+1)+' из '+p.length+'</span></div>';
    stage.appendChild(ctx);
    var col=el("div","col"); col.style.flexBasis="100%"; col.appendChild(cardScene(card,false)); stage.appendChild(col);
    var barColor=(filter&&filter!=="fav")?CATS[filter].color:"#ece1c8";
    var nav=el("div","pathnav");
    var prev=el("button","navarrow"); prev.innerHTML="‹"; prev.setAttribute("aria-label","Предыдущая карта");
    var next=el("button","navarrow"); next.innerHTML="›"; next.setAttribute("aria-label","Следующая карта");
    if(pos===0)prev.disabled=true; if(pos===p.length-1)next.disabled=true;
    prev.addEventListener("click",function(){ pathStep(-1); }); next.addEventListener("click",function(){ pathStep(1); });
    var posd=el("div","navpos");
    posd.innerHTML='<div class="pn">'+(pos+1)+' / '+p.length+'</div><div class="bar"><span style="width:'+Math.round((pos+1)/p.length*100)+'%;background:'+barColor+'"></span></div>';
    nav.appendChild(prev); nav.appendChild(posd); nav.appendChild(next); stage.appendChild(nav);
    stage.appendChild(el("div","flip-hint",'<span style="font-size:13px">↻</span> нажмите на карту, чтобы перевернуть'));
  }

  // ---- chrome ----
  var catsWrap, actionsWrap;
  function buildCats(){
    catsWrap.innerHTML="";
    function chip(f,label){ var on=(f===filter)||(f===null&&filter===null);
      var b=el("button","chip"+(on?" on":""),label);
      if(f&&f!=="fav"&&on) b.style.borderColor=hexA(CATS[f].color,.6);
      b.addEventListener("click",function(){ chooseFilter(f); }); catsWrap.appendChild(b); }
    function lab(t){ catsWrap.appendChild(el("div","catlabel",esc(t))); }
    chip(null,"Все");
    chip("fav",'<span class="dot" style="background:#e0608a"></span>♥ Избранное'+(favs.length?' <span class="cnt">'+favs.length+'</span>':''));
    lab("Фундамент · кто вы как лидер");
    Object.keys(CATS).filter(function(id){return CATS[id].tier==="Фундамент";}).forEach(function(id){ chip(id,'<span class="dot" style="background:'+CATS[id].color+'"></span>'+esc(CATS[id].name)); });
    lab("Доступ · как лидерство проявляется");
    Object.keys(CATS).filter(function(id){return CATS[id].tier==="Доступ";}).forEach(function(id){ chip(id,'<span class="dot" style="background:'+CATS[id].color+'"></span>'+esc(CATS[id].name)); });
  }
  function renderActions(){
    actionsWrap.innerHTML=""; var today=dayMark&&dayMark.date===todayLocal();
    var defs=[{a:"day",html:"Карта дня"+(today?' <span class="mini">✓ сегодня</span>':""),primary:true},
      {a:"draw",html:"Вытянуть карту"},{a:"spread",html:"Расклад «Ход»"},
      {a:"path",html:"🧭 Путь по колоде",on:view==="path"},{a:"journal",html:"⌚ Журнал"}];
    defs.forEach(function(d){ var b=el("button","btn"+(d.primary?" primary":"")+(d.on?" on":""),d.html);
      b.addEventListener("click",function(){ handleAction(d.a); }); actionsWrap.appendChild(b); });
  }
  function handleAction(a){ if(a==="journal"){ openJournal(); return; } if(a==="path"){ view==="path"?act(lastAction):showPath(); return; } act(a); }
  function chooseFilter(f){ filter=(filter===f)?null:f; buildCats(); syncToggle(); if(view==="path")renderPath(); else act(lastAction==="day"?"draw":lastAction); }
  function filterLabel(){ return filter===null?"все области":(filter==="fav"?"♥ избранное":CATS[filter].name.toLowerCase()); }
  function syncToggle(){ if(!ftoggleEl)return; ftoggleEl.innerHTML='области · '+esc(filterLabel())+' <span class="caret">'+(catsOpen?"▴":"▾")+'</span>'; }

  // ---- build chrome ----
  var app=document.getElementById("app"); app.innerHTML="";
  var wrap=el("div"); wrap.style.cssText="max-width:980px;margin:0 auto;position:relative";
  var header=el("div","header");
  header.innerHTML='<div class="eyebrow">колода различений · 48 карт</div><h1>Бытие Лидерства</h1><p class="tagline">увидеть · прожить · стать</p>';
  var controls=el("div","controls");
  var help=el("button","ctl",'<span class="q">?</span> Как пользоваться'); help.addEventListener("click",openHelp);
  var ftoggle=el("button","ctl"); ftoggleEl=ftoggle;
  ftoggle.addEventListener("click",function(){ catsOpen=!catsOpen; save(KEY.cats,catsOpen); catsWrap.className="cats"+(catsOpen?"":" collapsed"); syncToggle(); });
  controls.appendChild(help); controls.appendChild(ftoggle);
  catsWrap=el("div","cats"+(catsOpen?"":" collapsed")); actionsWrap=el("div","actions"); stage=el("div","stage");
  wrap.appendChild(header); wrap.appendChild(controls); wrap.appendChild(catsWrap); wrap.appendChild(actionsWrap); wrap.appendChild(stage);
  app.appendChild(wrap);
  syncToggle();

  // (наклон по курсору убран — он ставил инлайн-transform на карту и перебивал переворот)

  // ---- keyboard ----
  window.addEventListener("keydown",function(e){
    var ov=document.querySelector("[data-ov]"); if(ov){ if(e.key==="Escape")ov.remove(); return; }
    if(view==="path"){ if(e.key==="ArrowLeft"){ e.preventDefault(); pathStep(-1); } else if(e.key==="ArrowRight"){ e.preventDefault(); pathStep(1); } }
  });

  // ---- init ----
  buildCats(); act("day");
  if(!load(KEY.intro,0)) setTimeout(openHelp,400);
})();
</script>
</body>
</html>
